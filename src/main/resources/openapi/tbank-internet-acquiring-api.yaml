      ### Прием платежей с помощью стикеров с QR-кодом

      Стикер со статичным QR кодом — платежный QR-код, который размещается в кассовой зоне магазина.
      Его можно скачать в личном кабинете после создания магазина.

      #### Получить стикер

      Чтобы получить стикер с QR-кодом:
      1. Создайте магазин с выставлением счета. Если у вас уже есть магазин, переходите к пункту 2. 
      2. В разделе **Способы оплаты** перейдите в настройки СБП. 
      3. В разделе **Статический QR** нажмите **Скачать**. 
      4. Распечатайте и разместите QR-код в кассовой зоне вашего магазина.

      <details><summary><b>QR-стикер Т‑Банка</b></summary>

      <img src="https://cdn.tbank.ru/static/documents/novii_static_qr_skrin.png" width="500">

      </details>

      Покупателю будет нужно отсканировать стикер с QR-кодом, ввести сумму и подтвердить оплату.

      > При использовании стикера с QR-кодом операции не фискализируются через онлайн-кассы, даже если они подключены в личном кабинете.

      #### Уведомления об оплате

      После оплаты вам придет уведомление на электронную почту или по HTTP на ваш сервер — в зависимости от настроек.

      **Магазин — Выставление счетов**   

      Уведомления настраиваются по почте — acq_help@tbank.ru.

      **Магазин — Интернет-магазин**   

      Если у вас уже есть интернет-магазин, уведомления можно настроить самостоятельно в разделе
      **Терминал**.

      <img src="https://cdn.tbank.ru/static/documents/nastroikiterminala.png" width="500">

      ### Настроить выбор банка при интеграции по API

      Если вы интегрировались по API, можно настроить выбор банка при оплате по СБП.
      Для этого нужно создать прямую ссылку, которая перенаправит клиента в конкретное приложение банка при нажатии на нее.

      Чтобы сформировать прямую ссылку на переход в приложение банка, замените
      HTTPS из функциональной ссылки на значение параметра `schema` из [списка банков](https://qr.nspk.ru/proxyapp/c2bmembers.json).

      **Пример**

      Функциональная ссылка — https://qr.nspk.ru/AS10004UVOQ9J4I489A8SG8NIA6P3F8B. Меняем HTTPS на соответствующую `schema` Т‑Банка —
      `bank100000000004://qr.nspk.ru/AS10004UVOQ9J4I489A8SG8NIA6P3F8B`.
      Для каждого из банков нужно сделать такую прямую ссылку и отобразить [список банков](https://qr.nspk.ru/proxyapp/c2bmembers.json) 
      на вашей платёжной форме.

      # Виджет СБП

      СБП можно интегрировать с помощью виджета.

      ## Подключение платежного виджета

      ### Установка платежного виджета на сайт

      Вставьте код на ваш сайт туда, где должна располагаться кнопка **Оплатить через СБП**:

      ```
      <html lang="ru">
      <head> 
      <script defer src="https://securepay.tinkoff.ru/html/payForm/js/tinkoff_v2.js"></script> 
      <meta name="viewport" content="width=device-width, initial-scale=1"> 
      </head> 
      <body> 
      <style>.tinkoffPayRow{display:block;margin:1%;width:160px;}</style> 
      <!--    tinkoffWidgetContainer – уникальный id, задается произвольно-->
      <div id="tinkoffWidgetContainer1"></div> 
      <form name="TinkoffPayForm"> 
      <input class="tinkoffPayRow" type="hidden" name="terminalkey" value=""/> 
      <input class="tinkoffPayRow" type="hidden" name="language" value="ru" /> 
      <input class="tinkoffPayRow" type="text" placeholder="Сумма заказа" name="amount" value="111" required min="10.00"/> <input class="tinkoffPayRow" type="text" placeholder="Номер заказа" name="order"/> 
      <input class="tinkoffPayRow" type="text" placeholder="Описание заказа" name="description"/> 
      <input class="tinkoffPayRow" type="text" placeholder="ФИО плательщика" name="name"/> 
      <input class="tinkoffPayRow" type="text" placeholder="E-mail" name="email"/> 
      <input class="tinkoffPayRow" type="text" placeholder="Контактный телефон" name="phone"/> 
      </form> 
      </body>
      ```
      Сумма заказа `amount` указывается в рублях, копейки — через точку.

      ## Формирование чека

      Добавьте в код поле ввода `receipt`:

      ```
      <input class="tinkoffPayRow" type="hidden" name="receipt" value="">
      ```

      В значении атрибута `value` поля `receipt` указываются параметры чека. Пример добавленного код:

      ```
       const form = document.forms.TinkoffPayForm;

            // Данные для чека
            Object.defineProperty(form.receipt, 'value', {
              get: function () {
                return JSON.stringify({
                  Email: form.email.value,
                  Phone: form.phone.value,
                  EmailCompany: 'mail@mail.com',
                  Taxation: 'patent',
                  Items: [
                    {
                      Name: form.description.value || 'Оплата',
                      Price: form.amount.value + '00',
                      Quantity: 1.0,
                      Amount: form.amount.value + '00',
                      PaymentMethod: 'full_prepayment',
                      PaymentObject: 'service',
                      Tax: 'none',
                    },
                  ],
                });
              },
            });
      ```

      ## Настройка оплаты товаров

      Для подключения оплаты по СБП для одного и более товаров в методе [InitPayments](#tag/Oplata-cherez-SBP/operation/InitPayments) 
      нужно передавать массив `paymentItems` — это настройки, которые определяют размещение платёжных кнопок и информацию о платеже.

      Пример кода:
       
      ```
        const terminalkey = document.forms.TinkoffPayForm.terminalkey;

        const widgetParameters = {
          terminalKey: terminalkey.value,
          paymentItems: [
            {
              container: document.getElementById("tinkoffWidgetContainer1"),
              paymentInfo: function () {
                return {
                  paymentData: document.forms.TinkoffPayForm,
                };
              },
            },
          ],
          paymentSystems: { TinkoffFps: {} },
        };

        window.addEventListener("load", function () {
          initPayments(widgetParameters);
        });

      ```

      Структура объекта массива `paymentItems`:

      |Наименование|Обязательный|Тип данных|Описание|
      |-|---|--|-|
      |`container`|Да|HTMLFormElement|Элемент, в который вставляют кнопки|
      |`paymentInfo`|Да|Function/Object|Информация о платеже| 

      ## Настройка платежного виджета

      Вставьте идентификатор магазина в код платежного виджета в значение параметра `terminalkey`. Идентификатор магазина выдаётся банком —
      его можно получить в личном кабинете: раздел **Магазины** → вкладка **Терминалы**:

      Если вам нужно изменить состав полей платежного виджета, у полей, которые хотите скрыть, укажите `type` = `hidden`:

      ```
      <input class="tinkoffPayRow" type="hidden" placeholder="ФИО клиента" name="name"> 
      ```

      Если вам нужно сделать поле обязательным для заполнения, добавьте к нему параметр `required`:

      ```
      <input class="tinkoffPayRow" type="text" placeholder="E-mail" name="email" required>
      ```

      Платежный виджет стилизует магазин. Ограничений на стилизацию со стороны Т‑Банка нет:

      ```
      <meta name="viewport" content="width=device-width, initial-scale=1"> 
      <input class="tinkoffPayRow" type="hidden" placeholder="ФИО плательщика" name="name"> 
      <input class="tinkoffPayRow" type="text" placeholder="E-mail" name="email" required> 
      <input class="tinkoffPayRow" type="hidden" name="terminalkey" value="Идентификатор вашего магазина"> 

      ```

      Проверить статус платежа можно:
      - В личном кабинете интернет-эквайринга, просмотрев операции по СБП.
      - По API — через метод [GetState](https://www.tbank.ru/kassa/dev/payments/#tag/Standartnyj-platyozh/paths/~1GetState/post) или с помощью уведомлений по HTTP или на электронную почту. [Подробнее](https://www.tinkoff.ru/kassa/dev/payments/index.html#tag/Notifikacii-Merchanta-ob-operaciyah).

      # Тестирование QR
      Протестировать оплату через СБП можно только на PROD-окружении и DEMO-терминале

      <b> Сценарий «Платеж — успех» </b>

      1) Инициируйте начало платежной сессии — вызовите метод **Init**.
      2) Запросите формирование динамического QR-кода через метод **GetQr**.
      3) Отобразите динамический QR-код на странице клиенту. 
      4) Вызовите метод **SbpPayTest**, передавав в нем внутренний идентификатор платежной сессии Т‑Кассы — `PaymentId`.
      5) Запросите текущий статус платежа через метод **GetState**.
      6) Вернется ответ со статусом `CONFIRMED`.

      <b> Сценарий «Платеж — отказ по таймауту» </b>

      1) Инициируйте начало платежной сессии — вызовите метод **Init**.
      2) Запросите формирование динамического QR-кода через метод **GetQr**.
      3) Отобразите динамический QR-код на странице клиенту.
      4) Вызовите метод **SbpPayTest**, передавав в нем внутренний идентификатор платежной сессии Т‑Кассы (`PaymentId`) и параметр `IsDeadlineExpired` = `true`.
      5) Запросите текущий статус платежа через метод **GetState**.
      6) Вернется ответ со статусом `DEADLINE_EXPIRED`.

      <b> Сценарий «Платеж — отказ, отклонен Т‑Кассой» </b>

      1) Инициируйте начало платежной сессии — вызовите метод **Init**.
      2) Запросите формирование динамического QR-кода через метод **GetQr**.
      3) Отобразите динамический QR-код на странице клиенту.
      4) Вызовите метод **SbpPayTest**, передавав в нем внутренний идентификатор платежной сессии
      Т‑Кассы (`PaymentId`) и параметр `IsRejected` = `true`.
      5) Запросите текущий статус платежа через метод **GetState**.
      6) Вернется ответ со статусом `REJECTED`.

      <b> Сценарий «Возврат — успех» </b>

      1) Инициируйте возврат (не отмену) тестового платежа по QR-коду СБП, который успешно выполнен в тесте «Платеж-успех», через метод **Cancel**.
      2) Запросите текущий статус платежа через метод **GetState**.
      3) Вернется ответ со статусом `REFUNDED`.
  - name: T‑Pay
    description: "# Общая информация\n\nОплата доступна на мобильных устройствах и десктопах. Проводится последовательным вызовом\nметодов:\n\n- `/TinkoffPay/terminals/{terminalKey}/status`,\n- `/Init`,\n- `/TinkoffPay/transactions/{paymentId}/versions/{version}/link` или `/TinkoffPay/{paymentId}/QR`,\n- `/Confirm`,\n- `/Cancel`.\n\n## Особенности в /Init\n\nПри оплате T‑Pay, **обязательна** передача параметров устройства, с которого будет осуществлен переход в объекте DATA. Они критично влияют на переход в приложение с устройств. Пример:\n\n```\n\"DATA\": {\n  \"TinkoffPayWeb\": \"true\",\n  \"Device\": \"Desktop\",\n  \"DeviceOs\": \"iOS\",\n  \"DeviceWebView\": \"true\",\n  \"DeviceBrowser\": \"Safari\"\n }\n```\nРекомендации для заполнения поля `Device`:\n\n* Mobile — при оплате c мобильного устройства;\n* Desktop — при оплате c десктопного устройства.\n\nРекомендации для заполнения поля `DeviceOs`:\n\n* iOS,\n* Android,\n* macOS,\n* Windows,\n* Linux.\n\nРекомендации для заполнения поля `DeviceBrowser`:\n\n* Chrome,\n* Firefox,\n* JivoMobile,\n* Microsoft Edge,\n* Miui,\n* Opera,\n* Safari,\n* Samsung,\n* WebKit,\n* WeChat,\n* Yandex.\n\n**TinkoffPayWeb** - Параметр, отвечающий за использование ПФ мерчанта как основной ПФ\n\nВ случае использования мерчантом своей собственной ПФ - требуется передавать TinkoffPayWeb в значении true\n\n<details><summary><b>Схема прохождения операций</b></summary>\n\n<img src=\"https://cdn.tbank.ru/static/documents/tpay-scheme.png\" width=\"800\">\n\n</details>\n\n# Другие способы интеграции \n\n## Виджет T‑Pay\n\nВиджет T‑Pay — способ интеграции через установку виджета на сайт.\n\n### Подключение платежного виджета\n\n#### Установка платежного виджета на сайт\n\nВставьте код на ваш сайт туда, где должна располагаться кнопка **Оплатить**:\n\n```\n<style>.tinkoffPayRow{display:block;margin:1%;width:160px;}</style>\n\n<link rel=\"stylesheet\" href=\"./html/payForm/static/css/t-widget.css\" type=\"text/css >\n\n<script src=\"https://securepay.tinkoff.ru/html/payForm/js/tinkoff.js ></script>\n\n<form name=\"TinkoffPayForm\" onsubmit=\"pay(this); return false; >\n\n\t<input class=\"tinkoffPayRow\" type=\"hidden\" name=\"terminalkey\" value=\"EatFit3DS >\n\n\t<input class=\"tinkoffPayRow\" type=\"hidden\" name=\"frame\" value=\"true\">\n\n\t<input class=\"tinkoffPayRow\" type=\"hidden\" name=\"language\" value=\"ru\">\n\n\t<input class=\"tinkoffPayRow\" type=\"text\" placeholder=\"Сумма заказа\" name=\"amount\n \trequired>\n\n\t<input class=\"tinkoffPayRow\" type=\"text\" placeholder=\"Номер заказа\" name=\"order\">\n\n\t<input class=\"tinkoffPayRow\" type=\"text\" placeholder=\"Описание заказа\n \tname=\"description\">\n\n\t<input class=\"tinkoffPayRow\" type=\"text\" placeholder=\"ФИО клиента\" name=\"name\">\n\n\t<input class=\"tinkoffPayRow\" type=\"text\" placeholder=\"E-mail\" name=\"email\">\n\n\t<input class=\"tinkoffPayRow\" type=\"text\" placeholder=\"Контактный телефон\n \tname=\"phone\">\n\n\t<input class=\"tinkoffPayRow\" type=\"submit\" value=\"Оплатить\">\n\n</form>\n```\n\n#### Настройка платежного виджета\n\nВставьте идентификатор мерчанта в код платежного виджета в значение параметра `terminalkey`. Идентификатор мерчанта выдается Т‑Кассой —\nего можно получить в личном кабинете в разделе **Магазины**.\n\nЕсли вам нужно изменить состав полей платежного виджета, у полей, которые хотите скрыть, укажите `type` = `hidden`:\n\n```\n<input class=\"tinkoffPayRow\" type=\"hidden\" placeholder=\"ФИО\nклиента\" name=\"name\"> \n```\n\nЕсли вам нужно сделать поле обязательным для заполнения, добавьте к нему параметр `required`:\n\n```\n<input class=\"tinkoffPayRow\" type=\"text\" placeholder=\"E-mail\"\nname=\"email\" required> \n```\n\nЕсли вам нужно открывать платежную форму в текущем окне, укажите у этого атрибута значение `true`:\n\n```\n<input class=\"tinkoffPayRow\" type=\"hidden\" name=\"frame\"\nvalue=\"true\"> \n```\n\nПлатежный виджет стилизует мерчант. Ограничений на стилизацию со стороны Т‑Кассы нет:\n\n```\n<input class=\"tinkoffPayRow\" type=\"hidden\" name=\"terminalkey\"\nvalue=\"Идентификатор вашего магазина\"> \n```\n\n#### Формирование чека\n\nДобавьте в код поле ввода `receipt`:\n\n```\n<input class=\"tinkoffPayRow\" type=\"hidden\" name=\"receipt\" value=\"\">\n```\n\nВ значении атрибута `value` поля `receipt` указываются параметры чека. Пример добавленного код:\n\n```\n const form = document.forms.TinkoffPayForm;\n\n      // Данные для чека\n      Object.defineProperty(form.receipt, 'value', {\n        get: function () {\n          return JSON.stringify({\n            Email: form.email.value,\n            Phone: form.phone.value,\n            EmailCompany: 'mail@mail.com',\n            Taxation: 'patent',\n            Items: [\n              {\n                Name: form.description.value || 'Оплата',\n                Price: form.amount.value + '00',\n                Quantity: 1.0,\n                Amount: form.amount.value + '00',\n                PaymentMethod: 'full_prepayment',\n                PaymentObject: 'service',\n                Tax: 'none',\n              },\n            ],\n          });\n        },\n      });\n```\n\n### Подключение T‑Pay\n\n#### Подключение T‑Pay в личном кабинете\n\n1. Перейдите в личный кабинет и откройте страницу интернет-магазина, для которого вы хотите подключить оплату через T‑Pay на\nсайте. Выберите вкладку **Способы оплаты**. \n2. На плашке T‑Pay нажмите **Настроить**, перейдите в подраздел **Своя платежная форма** и нажмите **Включить**.\n\nПри успешном подключении T‑Pay для интернет-магазина отобразится страница активного статуса подключения T‑Pay на сайте.\n\n#### Подключение T‑Pay на страницах интернет-магазина\n\nВставьте код на ваш сайт туда, где должна располагаться кнопка T-Pay:\n\n```\n<div id=\"tinkoffWidgetContainer\"></div>\n<script type=\"text/javascript\">\nconst terminalkey = document.forms.TinkoffPayForm.terminalkey\nconst widgetParameters = {\n  container: 'tinkoffWidgetContainer’,\n  terminalKey: terminalkey.value,\n  paymentSystems: {\n   TinkoffPay: {\n    paymentInfo: function () {\n     return {\n      infoEmail: \"E-mail для отправки информации о платеже\",\n      paymentData: document.forms.TinkoffPayForm\n     }\n    }\n   },\n  },\n};\nwindow.addEventListener('load', function () {\n  initPayments(widgetParameters);\n});\n</script>\n\n```\n\nМетод [InitPayments](#tag/TPay/operation/InitPayments) запускает инициализацию платежных кнопок T‑Pay. Входной параметр метода `widgetParameters` - объект с данными о настройках проведения платежей, где нужно определить параметры, описанные в структуре метода [InitPayments](#tag/TPay/operation/InitPayments).\n\nСтруктура объекта `T‑Pay`:\n\n|Наименование| Обязательность |Тип данных|Описание|\n|-|----------------|--|-|\n|`paymentInfo`| Да             |Function/Object|Платежная информация|\n\n### Настройка оплаты множества товаров\n\nДля подключения оплаты по T-pay для одного и более товаров в методе [InitPayments](#tag/TPay/operation/InitPayments)\nнужно передавать массив `paymentItems` — это настройки, которые определяют размещение платёжных кнопок и информацию о платеже.\n\nПример кода:\n\n```\n<div id=\"tinkoffWidgetContainer1\"></div>\n\n<div id=\"tinkoffWidgetContainer2\"></div>\n\n<script type=\"text/javascript\">\n\n\tconst terminalkey = document.forms.TinkoffPayForm.terminalkey\n\n\tconst widgetParameters = {\n\n \tterminalKey: terminalkey.value,\n\n \tpaymentItems: [{\n\n \tcontainer: document.getElementById('tinkoffWidgetContainer1'),\n\n \tpaymentInfo: function () {\n\n \treturn {\n\n \tinfoEmail: \"E-mail для отправки информации о платеже\",\n\n \tpaymentData: document.forms.TinkoffPayForm\n\n \t}\n\n \t}},\n\n \t{\n\n \tcontainer: document.getElementById('tinkoffWidgetContainer2'),\n\n \tpaymentInfo: function () {\n\n \treturn {\n\n \tinfoEmail: \"E-mail для отправки информации о платеже\",\n\n paymentData: document.forms.TinkoffPayForm\n\n \t}\n\n \t}}],\n\n \tpaymentSystems: {\n\n \tTinkoffPay: {\n\n \t},\n\n \t},\n\n\t};\n\n\twindow.addEventListener('load', function () {\n\n \tinitPayments(widgetParameters);\n\n\t});\n\n</script>\n```\n\nСтруктура объекта массива `paymentItems`:\n\n|Наименование| Обязательность |Тип данных|Описание|\n|-|----------------|--|-|\n|`container`| Да             |HTMLFormElement|Элемент, в который вставляют кнопки|\n|`paymentInfo`| Да             |Function/Object|Платежная информация|"
  - name: MirPay
    description: |+
      ## Общая информация для оплат по MirPay
      C помощью MirPay покупатели c мобильными устройствами OC Android могут проводить оплату на сайте.   
      MirPay не поддерживает на IOS и Desktop.

      ## Подключение 
      1. Откройте расчетный счёт в Т‑Банке — для этого заполните [заявку](https://www.tbank.ru/business/).

      2. Подключите интернет-эквайринг — подайте [заявку](https://business.tbank.ru/oplata/main) на подключение интернет-эквайринга и заполните данные об организации и магазине.
      3. Выберите доступные типы интеграций.
          * Платежный [API](https://www.tbank.ru/kassa/dev/payments/#tag/Oplata-cherez-SBP/Obshaya-informaciya-dlya-oplat-po-QR).
          * Через Агента ТСП.

      ### Включение
      1. Войдите в свой личный кабинет и откройте страницу магазина, для которого вы хотите подключить оплату. Перейдите на вкладку **Способы оплаты**.

         <img src="https://cdn.tbank.ru/static/documents/fa5996fc-d52a-4f4b-b1cb-71bf4ebcd910.jpg" width="800">

      2. На плашке **MirPay** нажмите **Настроить**.
      3. Выберите способ интеграции, который планируете использовать:

      <details><summary><b>Платежная форма Т‑Банка</b></summary>

      Выберите вкладку **Платежная форма Т‑Банка** и нажмите **Включить**.

      <img src="https://cdn.tbank.ru/static/documents/miirpay-podlkuchenie-pf-t-bank.png" width="800">

      После подключения на экране появится сообщение «MirPay подключен»</details>

      <details><summary><b>Собственная платежная форма</b></summary>

      Если у вас уже есть собственная платежная форма нажмите **Включить** на вкладке
      **Своя платежная форма**. 

      После подключения на экране появится сообщение «MirPay включен»</details>

      4. Настройте интеграцию на сайте, в мобильном приложении или любом другом интерфейсе.
      ## Схема проведения платежа
      [![scheme](https://cdn.tbank.ru/static/documents/mirpaychema.png)](https://cdn.tbank.ru/static/documents/mirpaychema.png)
      1. Клиент со своего мобильного устройства с предустановленным приложением MirPay на
      web-сайте магазина мерчанта открывает страницу оплаты товара.
      2. Мерчант иницирует платежную сессию, отправляя запрос /init с данными по платежу в MAPI.
      3. MAPI создает платежную сессию в статусе NEW.
      4. MAPI возвращает Мерчанту данные о платежной сессии.
      5. Мерчант отображает клиенту кнопку MirPay.
      6. Клиент выбирает оплату по MirPay.
      7. Если мерчант не интегрирован с НСПК, то он запрашивает deeplink для перехода клиента в
      приложение MirPay у мапи, иначе он может пройти этот этап сам и перейти к этапу авторизации
      платежа и передаче платежных данных с помощью метода FinishAuthorize.
      8. Во время проведения оплаты, мерчант может узнать статус платежа, вызвав метод GetState.
      9. В конце платежа мерчант в зависимости от того был ли платеж успешный/не успешный
      переводит мерчанта на страницу success/fail url.

      ## Особенности работы метода /FinishAuthorize
      С особенными условиями работы метода при оплате по mirpay, можно ознакомиться в [соответствующем разделе](https://www.tbank.ru/kassa/dev/payments/#tag/Standartnyj-platezh/operation/FinishAuthorize), в описании параметра `CardData`


  - name: SberPay
    description: |-
      ## Подключение

      1. Перейдите в личный кабинет и откройте страницу интернет-магазина, для которого вы хотите подключить оплату через SberPay
      на сайте. Перейдите на вкладку **Способы оплаты**.
      2. Нажмите **Настроить** на плашке SberPay, перейдите в подраздел **Своя платежная форма** и нажмите **Включить**. 
      Если плашки нет — магазин находится на регистрации или перерегистрации в эквайринге Сбербанка.

      При успешном подключении SberPay для интернет-магазина должна отобразиться страница активного статуса подключения SberPay на сайте.

      SberPay **не работает** для мерчантов интегрированных через InSales. 

      ## Оплата через SberPay

      ### Требования к фронтовому решению

      Требования к функционалу и дизайну кнопки определяются Сбербанком:

      - [Нативная интеграция сценариев SberPay для mWeb2app сценария](https://ecomtest.sberbank.ru/promo/deeplink_select_mWeb2app_3.pdf) 
      - [Руководство по использованию SberPay](https://securepayments.sberbank.ru/wiki/doku.php/integration:sbol:guide_book)

      ### Общая информация

      Оплата доступна на мобильных устройствах и десктопах. Проводится последовательным вызовом методов:
      * `/Init`,
      * `/SberPay/transactions/{PaymentId}/link` или `/SberPay/{PaymentId}/QR`,
      * `/Confirm`,
      * `/Cancel`.

      ### Особенности в /Init

      * В параметре `returnUrl` не допускается использование символов: +, &, @, #, /, %, =, ~, _, |
      * При реализации подключения оплаты через SberPay Web, нужно обязательно передавать следующие параметры в объекте `Data`:

      ```
      "DATA": {
       "SberPayWeb": "true",
       "Device": "Desktop"
      }
      ```

      <details><summary><b>Схема прохождения операций</b></summary>

      <img src="https://cdn.tbank.ru/static/documents/sp_scheme_init.png" width="800">

      </details>

      ### Особенности /Confirm

      Из-за особенностей работы эквайринга Сбербанка подтвердить платежную сессию можно сделать только один раз — либо частично, либо полностью.
      Также из-за асинхронной обработки запросов на подтверждение платеж может вернуться в статусе `CONFIRMING`,
      если у сервисов партнера возникнут проблемы с производительностью.

      <details><summary><b>Схема прохождения операций</b></summary>

      <img src="https://cdn.tbank.ru/static/documents/sp_scheme_confirm.png" width="600">

      </details>

      ### Особенности /Cancel

      Из-за особенностей работы эквайринга Сбербанка отменить платежную сессию можно только один раз и только на полную сумму платежа. 
      Возврат можно делать несколько раз — как частично, так и полностью — до тех пор, пока не будет исчерпана сумма платежа.
      Также из-за асинхронной обработки запросов на подтверждение платеж может вернуться в статусе `REVERSING` или `REFUNDING`,
      если у сервисов партнера возникнут проблемы с производительностью.

      <details><summary><b>Схема прохождения операций</b></summary>

      <img src="https://cdn.tbank.ru/static/documents/sp_scheme_cancel.png" width="600">

      </details>
  - name: Получить справку по операции
