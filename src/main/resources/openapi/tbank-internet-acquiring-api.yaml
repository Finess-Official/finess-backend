        Email:
          description: |
            Электронная почта клиента.
          type: string
          format: email
          maxLength: 64
          example: a@test.ru
        Phone:
          description: |
            Телефон клиента в формате `+{Ц}`.
          type: string
          maxLength: 64
          example: '+79031234567'
        Customer:
          description: Идентификатор/имя клиента.
          type: string
        CustomerInn:
          description: ИНН клиента.
          type: string
        Items:
          description: Массив, содержащий в себе информацию о товарах.
          type: array
          items:
            $ref: '#/components/schemas/Items_FFD_12'
        Payments:
          description: |
            Объект c информацией о видах суммы платежа.
            * Если объект не передан, будет автоматически указана итоговая сумма чека с видом оплаты
             «Безналичный».
            * Если передан объект `receipt.Payments`, значение в `Electronic` должно быть равно итоговому значению
            Amount в методе **Init**. При этом сумма введенных значений по всем видам оплат, включая `Electronic`,
            должна быть равна сумме (`Amount`) всех товаров, переданных в объекте `receipt.Items`.
          type: array
          items:
            $ref: '#/components/schemas/Payments'
    Receipt_FFD_105-2:
      type: object
      description: Объект с информацией о видах суммы платежа.
      properties:
        Items:
          description: Массив позиций чека с информацией о товарах.
          type: array
          items:
            $ref: '#/components/schemas/Items_FFD_105'
        FfdVersion:
          description: |
            Версия ФФД.
            Возможные значения:
            * FfdVersion: `1.2`,
            * FfdVersion: `1.05`.

            Версия ФФД по умолчанию — `1.05`.
          type: string
          default: '1.05'
        Email:
          description: |
            Электронная почта клиента.
            Должен быть заполнен, если не передано значение 
            в параметре `Phone`.
          type: string
          format: email
          maxLength: 64
          example: a@test.ru
        Phone:
          description: |
            Телефон клиента в формате `+{Ц}`.
          type: string
          maxLength: 64
          example: '+79031234567'
        Taxation:
          description: |
            Система налогообложения. Возможные значения:
            * `osn` — общая СН;
            * `usn_income` — упрощенная СН (доходы);
            * `usn_income_outcome` — упрощенная СН (доходы минус расходы);
            * `envd` — единый налог на вмененный доход;
            * `esn` — единый сельскохозяйственный налог;
            * `patent` — патентная СН.
          type: string
          enum:
            - osn
            - usn_income
            - usn_income_outcome
            - envd
            - esn
            - patent
          example: osn
        Payments:
          description: |
            Объект c информацией о видах суммы платежа.
            * Если объект не передан, будет автоматически указана итоговая сумма чека с видом оплаты
             «Безналичный».
            * Если передан объект `receipt.Payments`, значение в `Electronic` должно быть равно итоговому значению
            Amount в методе **Init**. При этом сумма введенных значений по всем видам оплат, включая `Electronic`,
            должна быть равна сумме (`Amount`) всех товаров, переданных в объекте `receipt.Items`.
          type: array
          items:
            $ref: '#/components/schemas/Payments'
    NotificationFiscalization:
      type: object
      description: |
        **Уведомление о фискализации**

        Если используется подключенная онлайн касса, по результату фискализации будет
        отправлено уведомление с фискальными данными.
      properties:
        TerminalKey:
          description: |
            Идентификатор терминала. Выдается мерчанту Т‑Кассой
            при заведении терминала.
          type: string
          maxLength: 20
          example: TinkoffBankTest
        OrderId:
          description: |
            Идентификатор заказа в системе мерчанта.
          type: string
          maxLength: 36
          example: '21050'
        Success:
          description: |
            Успешность прохождения запроса — `true`/`false`.
          type: boolean
          example: true
        Status:
          description: |
            Для уведомлений о фискализации — всегда `RECEIPT`.
          type: string
          maxLength: 20
          default: RECEIPT
        PaymentId:
          description: |
            Идентификатор платежа в системе Т‑Кассы.
          type: number
          maxLength: 20
          example: 13660
        ErrorCode:
          description: |
            Код ошибки. `0` в случае успеха.
          type: string
          maxLength: 20
          example: '0'
        ErrorMessage:
          type: string
          description: Описание ошибки, если она произошла.
        Amount:
          description: |
            Сумма в копейках.
          type: number
          maxLength: 10
          example: 100000
        FiscalNumber:
          type: integer
          description: Номер чека в смене.
        ShiftNumber:
          type: integer
          description: Номер смены.
        ReceiptDatetime:
          type: string
          format: datetime
          description: Дата и время документа из ФН.
        FnNumber:
          type: string
          description: Номер ФН.
        EcrRegNumber:
          type: string
          description: Регистрационный номер ККТ.
        FiscalDocumentNumber:
          type: integer
          description: Фискальный номер документа.
        FiscalDocumentAttribute:
          type: integer
          description: Фискальный признак документа.
        Receipt:
          type: object
          description: Состав чека
          oneOf:
            - $ref: '#/components/schemas/Receipt_FFD_12-2'
            - $ref: '#/components/schemas/Receipt_FFD_105-2'
        Type:
          type: string
          description: Признак расчета.
        Token:
          description: |
            Подпись запроса. Формируется по такому же принципу, как и в случае
            запросов в Т‑Кассу.
          type: string
          example: 7241ac8307f349afb7bb9dda760717721bbb45950b97c67289f23d8c69cc7b96
        Ofd:
          type: string
          description: Наименование оператора фискальных данных.
        Url:
          type: string
          description: URL-адрес с копией чека.
        QrCodeUrl:
          type: string
          description: URL-адрес с QR-кодом для проверки чека в ФНС.
        CalculationPlace:
          type: string
          description: Место осуществления расчетов.
        CashierName:
          type: string
          description: Имя кассира.
        SettlePlace:
          type: string
          description: Место нахождения (установки) ККМ.
    NotificationQr:
      type: object
      description: |
        **Уведомление о статусе привязки счета по QR**

        После привязки счета по QR магазину отправляется статус привязки и токен.
        Уведомление будет приходить по статусам `ACTIVE` и `INACTIVE`.
      required:
        - TerminalKey
        - RequestKey
        - Status
        - NotificationType
        - Success
        - ErrorCode
        - Token
      properties:
        TerminalKey:
          type: string
          description: |
            Идентификатор терминала, выдается мерчанту Т‑Кассой..
          example: TinkoffBankTest
        RequestKey:
          description: |
            Идентификатор запроса на привязку счета.
          type: string
          format: uuid
          example: 13021e10-a3ed-4f14-bcd1-823b5ac37390
        AccountToken:
          type: string
          description: |
            Идентификатор привязки счета,
            назначаемый банком-эмитентом.
          example: 70LSS7DN18SJQRS10006DNPKLJL24B05
        BankMemberId:
          description: |
            Идентификатор банка-эмитента клиента, который будет
            совершать оплату по привязанному счету —
            заполнен, если статус `ACTIVE`.
          type: string
          example: '5555'
        BankMemberName:
          description: |
            Наименование банка-эмитента. Заполнен, если передан `BankMemberId`.
          type: string
        NotificationType:
          type: string
          description: Тип уведомления, всегда — `LINKACCOUNT`.
          default: LINKACCOUNT
        Success:
          description: |
            Успешность прохождения запроса — `true`/`false`.
          type: boolean
          example: true
        ErrorCode:
          description: |
            Код ошибки. `0` в случае успеха.
          type: string
          maxLength: 20
          example: '0'
        Message:
          description: |
            Краткое описание ошибки.
          type: string
        Token:
          type: string
          description: |
            Подпись запроса. Формируется по такому же
            принципу, как и в случае запросов в Т‑Кассу.
          example: 871199b37f207f0c4f721a37cdcc71dfcea880b4a4b85e3cf852c5dc1e99a8d6
        Status:
          type: string
          description: Статус привязки.
          example: ACTIVE
    GetDeepLink:
      type: object
      required:
        - TerminalKey
        - PaymentId
        - Token
      properties:
        TerminalKey:
          type: string
          description: Идентификатор терминала. <br> Выдается мерчанту Т‑Кассой при заведении терминала.
          example: bestforu
        PaymentId:
          type: string
          description: Уникальный идентификатор транзакции в системе Банка.
          example: '2559680770'
        Token:
          type: string
          description: Подпись запроса.
          example: 871199b37f207f0c4f721a37cdcc71dfcea880b4a4b85e3cf852c5dc1e99a8d6
