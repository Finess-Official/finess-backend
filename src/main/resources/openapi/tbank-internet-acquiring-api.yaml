      | `Email` | String | Нет* | Электронная почта для отправки чека.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              | 1008 |
      | `Phone` | String | Нет* | Телефон для отправки чека.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        | 1008 |
      | `Taxation` | Enum | Да | Система налогообложения. Возможные значения:<br> • `osn` — общая СН;<br> • `usn_income` — упрощенная СН;<br> • `usn_income_outcome` — упрощенная СН (доходы минус расходы);<br> • `envd` — единый налог на вмененный доход;<br> • `esn` — единый сельскохозяйственный налог;<br> • `patent` — патентная СН.<br><br>Примечание:<br>‣ Самозанятые работают по системе налогообложения НПД — налог на профессиональную деятельность. Интегрировать онлайн-кассу и передавать такую СНО не нужно. Формировать чеки нужно в приложении или веб-версии «Мой налог».<br>‣ Автоматизированная упрощённая система налогообложения. Передавать такую систему налогообложения нужно как УСН. Это работает только для обычной схемы, для Т-Чеков не работает. | 1055 |
