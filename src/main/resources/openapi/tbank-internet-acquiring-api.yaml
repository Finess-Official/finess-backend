  /v2/Check3dsVersion:
    post:
      operationId: Check3dsVersion
      tags:
        - Стандартный платеж
      summary: Проверить версию 3DS
      description: |
        `Для мерчантов, использующих собственную платежную форму`
         <br><br> Метод возвращает версию протокола 3DS, по которому может аутентифицироваться карта.

         При определении 3DS v2.1 возможно получение данных для прохождения дополнительного метода `3DS Method`. Он позволяет эмитенту собрать данные браузера клиента, что может быть полезно при принятии решения в пользу Frictionless Flow (аутентификация клиента без редиректа на страницу ACS).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - PaymentId
                - TerminalKey
                - CardData
                - Token
              properties:
                PaymentId:
                  description: |
                    Идентификатор платежа в системе Т‑Кассы.
                  type: string
                  maxLength: 20
                TerminalKey:
                  description: |
                    Идентификатор терминала, выдается мерчанту Т‑Кассой.
                  type: string
                  maxLength: 20
                CardData:
                  description: |
                    Зашифрованные данные карты в формате: 
                      ```
                      PAN=4300000000000777;ExpDate=0519;CardHolder=IVAN PETROV;CVV=111
                      ```
                  type: string
                Token:
                  description: |
                    Подпись запроса.
                  type: string
            example:
              PaymentId: 13660
              TerminalKey: testRegressBank
              CardData: U5jDbwqOVx+2vDApxe/rfACMt+rfWXzPdJ8ZXxNFVIiZaLZrOW72bGe9cKZdIDnekW0nqm88YxRD↵jyfa5Ru0kY5cQV alU+juS1u1zpamSDtaGFeb8sRZfhj72yGw+io+qHGSBeorcfgoKStyKGuBPWfG↵d0PLHuyBE6QgZyIAM1XfdmNlV0UAxOnkTGDsskL pIt3AWhw2e8KOar0vwbgCTDjznDB1/DLgOW01↵Aj/bXyLJoG1BkOrPBm9JURs+f+uyFae0hkRicNKNgXoN5pJTSQxOEauOi6ylsVJ B3WK5MNYXtj6x↵GlxcmTk/LD9kvHcjTeojcAlDzRZ87GdWeY8wgg==
              Token: 30797e66108934dfa3d841b856fdad227c6b9c46d6a39296e02dc800d86d181e
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - Version
                  - PaymentSystem
                  - Success
                  - ErrorCode
                properties:
                  Version:
                    description: |
                      Версия протокола 3DS. 
                      Примеры:
                      * `1.0.0` — первая версия,
                      * `2.1.0` — вторая версия.
                    type: string
                  TdsServerTransID:
                    description: |
                      Уникальный идентификатор транзакции,
                      который генерируется 3DS-Server. Обязательный
                      параметр для 3DS второй версии.
                    type: string
                  ThreeDSMethodURL:
                    description: |
                      Дополнительный параметр для 3DS второй
                      версии, который позволяет пройти этап по
                      сбору данных браузера ACS-ом.
                    type: string
                    format: uri
                  PaymentSystem:
                    description: |
                      Платежная система карты.
                    type: string
                  Success:
                    description: |
                      Успешность прохождения запроса — `true`/`false`.
                    type: boolean
                  ErrorCode:
                    description: |
                      Код ошибки. `0` в случае успеха.
                    type: string
                    maxLength: 20
                  Message:
                    description: |
                      Краткое описание ошибки.
                    type: string
                  Details:
                    description: |
                      Подробное описание ошибки.
                    type: string
              example:
                Version: 2.1.0
                TdsServerTransID: 17d3791b-5cfa-4318-bc23-3d949e8c4b7e
                ThreeDSMethodURL: https://acs.vendorcert.mirconnect.ru/ds/6300
                PaymentSystem: mir
                Success: true
                ErrorCode: '0'
                Message: None
                Details: None
  /v2/3DSMethod:
    post:
      security: []
      description: '  `Для Мерчантов с PCI DSS` <br> Метод используется для сбора информации ACS-ом о девайсе. Обязателен, если для 3DSv2.1 в ответе метода `Check3dsVersion` был получен параметр ThreeDSMethodURL.<br><br>Условия выполнения:<br>• В скрытом iframe на стороне браузера<br>• С таймаутом ожидания ответа на запрос - 10 секунд'
      summary: Прохождение этапа “3DS Method”
      servers:
        - url: https://acs.vendorcert.mirconnect.ru/ds/6300
          description: Возвращается в ответе метода  Check3dsVersion внутри параметра ThreeDSMethodURL
      tags:
