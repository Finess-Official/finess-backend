      | `TransferPhones` | Array of Strings | Нет | Телефоны оператора перевода в формате `+{Ц}`.<br> Атрибут обязателен, если в `AgentSign` передан в значениях:<br> • `bank_paying_agent`;<br>• `bank_paying_subagent`.                                                                                                                                                                                               | 1075 |
      | `OperatorName` | String | Нет | Наименование оператора перевода.<br> Атрибут обязателен, если в `AgentSign` передан в значениях:<br> • `bank_paying_agent`;<br> • `bank_paying_subagent`.                                                                                                                                                                                                           | 1026 |
