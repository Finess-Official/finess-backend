        - lang: Пример декодированного значения threeDSMethodData
          source: |
            {
            "threeDSServerTransID":"56e712a5-190a-4588-91bc-e08626e77c44",
            "threeDSMethodNotificationURL":https://rest-api-test.tinkoff.ru/v2/Complete3DSMethodv2
            }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/3DSMethod-2'
