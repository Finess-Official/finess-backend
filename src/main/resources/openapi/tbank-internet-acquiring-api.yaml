  - name: Сценарии привязки карты
    description: |-
      ## Общая информация

      Мерчант может сохранить платежные данные клиента, чтобы при последующих оплатах ему не приходилось заполнять платежную форму.
      Для этого клиент привязывается к терминалу, через который будут проходить платежи. После этого клиент может сохранять карты. 

      Мерчант может выбрать способ привязки клиента — с проверкой 3D-Secure или без. Если выбран вариант:

      - С проверкой 3D-Secure — клиент должен будет подтвердить операцию на этом этапе. Все дальнейшие платежи будут проходить по 
      схеме рекуррентного платежа, то есть подтверждать каждое списание не нужно.

      - Без проверки 3D-Secure — клиент и его карты будут сохранены без подтверждения, но оно понадобится при первом платеже по привязанной карте.

      За способ привязки отвечает параметр `CheckType` в запросе метода `AddCard`. Если мерчант не передаст этот параметр, MAPI по умолчанию 
      будет считать, что привязка прошла без подтверждения клиента.

      Срок жизни формы привязки ограничен и составляет 2 суток.

      > Для корректной работы методов Т‑Касса должна разрешить мерчанту привязывать карты и клиентов к терминалу. В результате
      >привязки карты к параметру `CustomerKey` будет привязан `CardId`.

      ## Сценарии работы с картами и клиентами

      ### Добавление, получение и удаление клиента

      Мерчант вызывает метод и передает нужный параметр. Чтобы:

      - Сохранить идентификатор клиента `CustomerKey` — через метод **AddCustomer**, передав в запросе параметр `CustomerKey`.
      - Удалить клиента из списка привязанных к терминалу — через метод **RemoveCustomer**, передав в запросе параметр `CustomerKey`.
      - Получить сохраненные данные клиента — через метод **GetCustomer**, передав в запросе параметр `CustomerKey`.

      ### Добавление, получение и удаление карты

      <span style="color:#900C3F">Для мерчантов, использующих собственную платежную форму</span>

      #### Инициализация привязки

      Когда клиент сохранится в списке привязанных к терминалу, мерчант может добавить карту. Для этого мерчант вызывает метод
      **AddCard** и в запросе передает параметр `CustomerKey`. MAPI вернет идентификатор сессии привязки карты — `PaymentId`.

      #### Проверка версии 3DS

      На следующем этапе мерчант вызвает метод **Check3DSVersion**, в котором передает зашифрованные карточные данные клиента и 
      `PaymentId`. Это нужно для проверки версии протокола 3D-Secure по карте. Она может быть версии 1.0 или 2.0.

      Если в ответе метода **Check3DSVersion** есть параметр `ThreeDSMethodURL`, браузер клиента должен вызывать ресурс, 
      адрес которого пришел в параметре `ThreeDSMethodURL`. В запросе нужно передать строковый параметр `threeDSMethodData`.
      Эта строка — закодированный в формате `base64` JSON-объект с параметрами:

      | <div style="width:240px">Название параметра</div> | Тип данных | Описание                                                                          |
      |---|---|-----------------------------------------------------------------------------------|
      |`threeDSMethodNotificationURL`|string| Обратный адрес, на который будет отправлен запрос после прохождения `3DS Method`. |
      |`threeDSServerTransID`|string| Идентификатор транзакции из ответа метода `Check3DSVersion`.                      |

      Браузер должен вызвать `3DS Method` в скрытом iframe и передать данные в формате `x-www-form-urlencoded`.

      >Пример запроса на `ThreeDSMethodURL`:
      >
      >``` js
      ><body onload="document.form.submit()">
      ><form name="form" action="{ThreeDSMethodURL}" method="post" >
      > <input type="hidden" name=" threeDSMethodData"
      >value="eyJ0aHJlZURTU2VydmVyVHJhbnNJRCI6IjU2ZTcxMmE1LTE5MGEtNDU4OC05MWJjLWUwODYyNmU3N2M0NCIsInRocm
      >VlRFNNZXRob2ROb3RpZmljYXRpb25VUkwiOiJodHRwczovL3Jlc3QtYXBpLXRlc3QudGlua29mZi5ydS92Mi9Db21wbGV0ZTNEU0
      >1ldGhvZHYyIn0">
      ></form>
      ></body>
      >```
      >
      >Пример декодированного значения `threeDSMethodData`:
      >```json
      >{
      >"threeDSServerTransID":"56e712a5-190a-4588-91bc-e08626e77c44",
      >"threeDSMethodNotificationURL":"https://rest-api-test.tinkoff.ru/v2/>Complete3DSMethodv2"
      >}
      >```

      #### Завершение привязки

      Для завершения привязки карты мерчант вызывает метод **AttachCard** и передает зашифрованные карточные данные, а также набор
      параметров для прохождения проверки 3D-Secure.

      В ответ MAPI вернет один из возможных статусов платежа:

      |<div style="width:120px">Статус</div>|Описание|Доступные действия|
      |---|---|---|
      |`REJECTED`|Привязка отклонена|Провести привязку заново|
      |`COMPLETED`|Успешная привязка карты|-|
      |`3DS_CHECKING`|Требуется подтверждение привязки по 3D-Secure|<ul><li>Отменить привязку</li><li>Пройти подтверждение</li></ul>|

      Если в ответе метода **AttachCard** вернулся статус `3DS_CHECKING` — это значит, что нужно пройти проверку 3D-Secure. Для этого мерчант должен
      сформировать запрос в сервис аутентификации банка, выпустившего карту. Адрес сервиса возвращается в ответе **AttachCard** в параметре `ACSUrl`. Вместе с
      этим нужно перенаправить клиента на эту же страницу `ACSUrl` для прохождения 3DS.

      В заголовке запроса передается параметр `Content-Type` со значением ` application/x-www-form-urlencoded`. Набор параметров в
      теле запросе зависит от версии протокола 3DS по карте.

      ##### 3DS 1.0

      Если версия 3DS — 1.0, в запросе передаются параметры:

      |Название параметра| Описание                                                                                                                                                                       |
      |---|--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|
      |`MD`| Информация для идентификации платежной сессии на стороне торговой точки. Возвращается в ответе метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).   |
      |`PaReq`| Запрос на аутентификацию плательщика, который содержит разные детали транзакции. Возвращается в ответе метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize). |
      |`TermURL`| Адрес перенаправления после аутентификации 3DS. Должен содержать ссылку на обработчик на стороне мерчанта, принимающий результаты прохождения 3-D Secure.                      |

      ##### 3DS 2.0

      Если версия 3DS — 2.0, в запросе передаются параметры в зависимости от типа устройства клиента.

      Параметры для браузера:

      |Название параметра|Тип данных| Описание                                                                                                                                   |
      |---|---|--------------------------------------------------------------------------------------------------------------------------------------------|
      |`creq`|string| JSON с параметрами `threeDSServerTransID`, `acsTransID`,`challengeWindowSize`, `messageType`, `messageVersion`, закодированный в `base64`. |

      Строка `creq` для браузера формируется из следующих параметров:

      |<div style="width:170px">Название параметра</div>|Тип данных| Описание                                                                                                                                                                                                                |
      |---|---|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|
      |`threeDSServerTransID`|string| Идентификатор транзакции из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).                                                                                                        |
      |`acsTransID`|string| Идентификатор транзакции, присвоенный ACS, полученный из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).                                                                           |
      |`challengeWindowSize`|string| Размер экрана, на котором открыта страница ACS. Допустимые значения:<li>**01** = 250 x 400;</li><li>**02** = 390 x 400;</li><li>**03** = 500 x 600;</li><li>**04** = 600 x 400;</li><li>**05** = Full screen.</li></ul> |
      |`messageType`|string| Передается фиксированное значение `CReq`.                                                                                                                                                                               |
      |`messageVersion`|string| Версия 3DS, полученная из ответа метода [Check3DSVersion](#tag/Standartnyj-platezh/operation/Check3dsVersion).                                                                                                          |

      Параметры для приложения:

      |Название параметра|Тип данных| Описание                                                                                                                                                  |
      |---|---|-----------------------------------------------------------------------------------------------------------------------------------------------------------|
      |`creq`|string| JWE object с параметрами `threeDSServerTransID`, `acsTransID`, `messageType`, `messageVersion`, закодированный в `PS256`. |

      Строка `creq` для приложения формируется из следующих параметров:

      |<div style="width:170px">Название параметра</div>|Тип данных| Описание                                                                                                                             |
      |---|---|--------------------------------------------------------------------------------------------------------------------------------------|
      |`threeDSServerTransID`|string| Идентификатор транзакции из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).                                                                         |
      |`acsTransID`|string| Идентификатор транзакции, присвоенный ACS, полученный из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).                                                 |
      |`messageType`|string| Передается фиксированное значение `CReq`.                                                                                              |
      |`messageVersion`|string| Версия 3DS, полученная из ответа метода [Check3DSVersion](#tag/Standartnyj-platezh/operation/Check3dsVersion).                                                                           |
      <!--|`sdkTransID`|string| Уникальный идентификатор транзакции, назначенный 3DS SDK для идентификации одной транзакции, полученный из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize). |
      |`sdkCounterStoA`|string| Внутренний счетчик 3DS SDK внутри ACS. Поддерживаемые значения:<br>000–255.</br>                                                     |-->


      #### Подтверждение прохождения 3DS

      Когда сервис аутентификации банка, который выпустил карту, прислал результат прохождения 3D-Secure, мерчант должен
      передать эту информацию в MAPI. В зависимости от версии протокола 3DS нужно вызвать один из методов:

      - Для 3DS 1.0 — [Submit3DSAuthorization](#tag/Prohozhdenie-3DS/operation/Submit3DSAuthorization).
      - Для 3DS 2.0 — [Submit3DSAuthorizationV2](#tag/Prohozhdenie-3DS/operation/Submit3DSAuthorizationV2).

      #### Завершение привязки

      Если привязка завершилась успешно, клиент будет перенаправлен на страницу `Success Add Card URL` из настроек терминала.

      ## Статусная модель привязки карты

      В процессе обработки операция привязки меняет свое состояние. Основные статусы и условия перехода в них:

      | Статус | Описание                            |
      | --- |-------------------------------------|
      | `NEW` | Новая сессия.                       |
      | `FORM_SHOWED` | Показ формы привязки карты.         |
      | `3DS_CHECKING` | Отправка клиента на проверку 3DS.   |
      | `3DS_CHECKED` | Клиент успешно прошел проверку 3DS. |
      | `AUTHORIZING` | Отправка платежа на 0 руб.          |
      | `AUTHORIZED` | Платеж на 0 руб прошел успешно.     |
      | `COMPLETED` | Привязка успешно завершена.         |
      | `REJECTED` | Привязка отклонена.                 |


      <details><summary><b>Полный жизненный цикл привязки карты — схема</b></summary>

      <img src="https://cdn.tbank.ru/static/documents/Status%20scheme%20of%20linking%20cards.png" width="800">
      </details>
  - name: СБП
    description: |-
      ## Про оплаты по QR

      - Покупатель выбирает банк на своём устройстве — через API это настроить нельзя.
      - Если оплата СБП отклоняется на стороне эмитента, эквайер на своей стороне не может повлиять на это.
      - На платежной форме банка при выборе способа оплаты `СБП` отображается QR-код с текстом «Отсканируйте в приложении Т-Банка». 
      Мы указываем только информацию о Т-Банке, потому что не можем гарантировать, что другие банки позволяют сканировать QR-коды в своих приложениях.
      - По СБП нет двухстадийной оплаты, поэтому средства нельзя захолдировать даже при рекуррентном платеже.
      - СБП не работает для маркетплейсов.
      - Тестировать оплату через СБП можно только на PROD-окружении и DEMO-терминале. 

      URL: https://securepay.tinkoff.ru/v2/

      ## Статусная модель платежа 

      В процессе обработки платеж меняет свое состояние. Основные статусы и условия перехода в них:

      |<div style="width:140px">Статус</div>| Правило перехода                                                                                                                                                                                                                                                                          |
      |---|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|
      |`NEW`| MAPI получил запрос [Init](#tag/Standartnyj-platezh/operation/Init). После этого он создает новый платеж со статусом `NEW` и возвращает его идентификатор в параметре `PaymentId`, а также ссылку на платежную форму в параметре `PaymentURL`.                                            |
      |`FORM_SHOWED`| Мерчант перенаправил клиента на страницу платежной формы `PaymentURL` и страница загрузилась у клиента в браузере.                                                                                                                                                                        |
      |`AUTHORIZING`| Платеж обрабатывается MAPI и платежной системой.                                                                                                                                                                                                                                          |
      |`AUTHORIZED`| Платеж авторизован, деньги заблокированы на карте клиента.                                                                                                                                                                                                                                |
      |`CONFIRMING`| Подтверждение платежа обрабатывается MAPI и платежной системой.                                                                                                                                                                                                                           |
      |`CONFIRMED`| Платеж подтвержден, деньги списаны с карты клиента.                                                                                                                                                                                                                                       |
      |`REFUNDING`| Мерчант запросил отмену подтвержденного платежа. Возврат обрабатывается MAPI и платежной системой.                                                                                                                                                                                        |
      |`ASYNC_REFUNDING`| Обработка возврата денежных средств по QR.                                                                                                                                                                                                                                                |
      |`PARTIAL_REFUNDED`| Частичный возврат по подтвержденному платежу завершился успешно.                                                                                                                                                                                                                          |
      |`REFUNDED`| Полный возврат по подтвержденному платежу завершился успешно.                                                                                                                                                                                                                             |
      |`CANCELED`| Мерчант отменил платеж.                                                                                                                                                                                                                                                                   |
      |`DEADLINE_EXPIRED`| 1. Клиент не завершил платеж в срок жизни ссылки на платежную форму `PaymentURL`. Этот срок мерчант передает в методе [Init](#tag/Standartnyj-platezh/operation/Init) в параметре `RedirectDueDate`. <br>2. Платеж не прошел проверку 3D-Secure в срок. |
      |`ATTEMPTS_EXPIRED`| Клиент превысил количество попыток открытия формы.                                                                                                                                                                                                                                        |
      |`REJECTED`| Банк отклонил платеж.                                                                                                                                                                                                                                                                     |
      |`AUTH_FAIL`| Платеж завершился ошибкой или не прошел проверку 3D-Secure.                                                                                                                                                                                                                               |

