tags:
  - name: Сценарии оплаты по карте
    description: |-
      ## Правила работы

      Прием платежей происходит с помощью вызова методов — параметры передаются через метод POST в формате JSON. Все методы и
      передаваемые параметры чувствительны к регистру. 

      Для нашего интернет-эквайринга оплата проходит только в рублях.

      > Если мерчанту нужна оплата в валюте, он самостоятельно реализовывает логику конвертации суммы в запросе на своей стороне.
        
      Для POST-запроса в заголовке должен быть `Content Type: application/json`.

      URL: https://securepay.tinkoff.ru/v2/

      ## Сценарии платежа

      Основная сущность в интернет-эквайринге Т‑Кассы — платеж. В зависимости от настроек терминала, платеж может идти 
      по двум сценариям:

      - Одностадийный платеж — если мерчант хочет получить деньги сразу после завершения оплаты, терминал должен быть настроен на приём одностадийных платежей. 
      - Двухстадийный платеж — после оплаты деньги заблокируются на карте клиента, а мерчант подтвердит платёж в удобный ему момент в течение 7 дней со дня авторизации, включая день авторизации.

      >Настроить способ приема на терминале можно в личном кабинете мерчанта или передать нужный тип в параметре `PayType` при вызове метода [Init](#tag/Standartnyj-platezh/operation/Init).

      ### Сценарий платежа с обработкой карточных данных на стороне мерчанта
      #### Инициировать платеж

      Чтобы создать платеж, мерчант должен инициировать его через метод [Init](#tag/Standartnyj-platezh/operation/Init) — передать 
      сумму платежа и номер заказа.

      При вызове метода [Init](#tag/Standartnyj-platezh/operation/Init) в объекте `DATA` в атрибуте `OperationInitiatorType` нужно передавать признак 
      инициатора операции. В ответ MAPI создаст новый платеж в статусе `NEW` и вернёт его идентификатор в параметре `PaymentId`.

      После этого мерчант вызывает метод [Check3DSVersion](#tag/Standartnyj-platezh/operation/Check3dsVersion), в котором передает 
      зашифрованные карточные данные клиента и `PaymentId`. Это нужно для проверки версии протокола 3D-Secure по карте. Она 
      может быть версии 1.0 или 2.0.

      Если в ответе метода [Check3DSVersion](#tag/Standartnyj-platezh/operation/Check3dsVersion) есть параметр `ThreeDSMethodURL`, 
      браузер клиента должен вызывать ресурс, адрес которого пришел в параметре `ThreeDSMethodURL`. В запросе нужно передать
      строковый параметр `threeDSMethodData`. Эта строка — закодированный в формате `base64` 
      JSON-объект с параметрами:

      |<div style="width:240px">Название параметра</div>|Тип данных| Описание                                                                          |
      |---|---|-----------------------------------------------------------------------------------|
      |`threeDSMethodNotificationURL`|string| Обратный адрес, на который будет отправлен запрос после прохождения `3DS Method`. |
      |`threeDSServerTransID`|string| Идентификатор транзакции из ответа метода [Check3DSVersion](#tag/Standartnyj-platezh/operation/Check3dsVersion).                      |

      Браузер должен вызвать `3DS Method` в скрытом iframe и передать данные в формате `x-www-form-urlencoded`.

      Пример запроса на `ThreeDSMethodURL`:

      ``` html
      <body onload="document.form.submit()">
      <form name="form" action="{ThreeDSMethodURL}" method="post" >
      <input type="hidden" name="threeDSMethodData" value="eyJ0aHJlZURTU2VydmVyVHJhbnNJRCI6IjU2ZTcxMmE1LTE5MGEtNDU4OC05MWJjLWUwODYyNmU3N2M0NCIsInRocmVlRFNNZXRob2ROb3RpZmljYXRpb25VUkwiOiJodHRwczovL3Jlc3QtYXBpLXRlc3QudGlua29mZi5ydS92Mi9Db21wbGV0ZTNEU01ldGhvZHYyIn0">
      </form>
      </body>
      ```

      Пример декодированного значения `threeDSMethodData`:

      ```json
      {

      "threeDSServerTransID":"56e712a5-190a-4588-91bc-e08626e77c44",
      "threeDSMethodNotificationURL":"https://rest-api-test.tinkoff.ru/v2/Complete3DSMethodv2"

      }
      ```

      ### Стандартный платеж

      За проведение платежа отвечает метод [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize). Через него 
      мерчант передает в MAPI карточные данные клиента, продолжая обработку платежа.

      Если платеж: 
      - Одностадийный — после вызова метода деньги будут списаны с карты клиента.
      - Двухстадийный — после вызова метода деньги будут заблокированы на карте клиента. Мерчант должен дополнительно подтвердить списание,
      вызвав метод [Confirm](#tag/Dvuhstadijnyj-platezh/operation/Confirm).

      В ответ MAPI вернет один из статусов:

      |<div style="width:110px">Статус</div>|Описание| Доступные действия                                                                                                             |
      |---|---|--------------------------------------------------------------------------------------------------------------------------------|
      |`AUTH_FAIL`|Неуспешная авторизация| Провести платеж заново                                                                                                         |
      |`REJECTED`|Платеж отклонен| Провести платеж заново                                                                                                         |
      |`CONFIRMED`|Успешный одностадийный платеж| -                                                                                                                              |
      |`AUTHORIZED`|Успешный двухстадийный платеж| Подтвердить платеж                                                                                                             |
      |`3DS_CHECKING`|Требуется подтверждение платежа по 3D-Secure| <ul><li>Отменить платеж — действие доступно для клиента</li><li>Пройти подтверждение — действие доступно для клиента</li></ul> |


      #### Без 3DS-подтверждения

      Если по платежу не нужно проходить подтверждение 3DS, в ответе [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize)
      MAPI вернет один из трех конечных статусов платежа:

      - `CONFIRMED` — при одностадийном платеже;
      - `AUTHORIZED` — при двухстадийном платеже;
      - `REJECTED` — при отказе в проведении платежа.

      #### С 3DS-подтверждением

      Если в ответе метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize) вернулся статус 
      `3DS_CHECKING` — значит, нужно пройти проверку 3D-Secure. Для этого мерчант должен сформировать
      запрос в сервис аутентификации банка, выпустившего карту. Адрес сервиса возвращается в ответе [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize) в 
      параметре `ACSUrl`. Вместе с этим нужно перенаправить клиента для прохождения 3DS на эту же страницу — `ACSUrl`.

      В заголовке запроса нужно передать параметр `Content-Type` со значением ` application/x-www-form-urlencoded`. 
      Набор параметров в теле запросе зависит от версии протокола 3DS по карте.

      > Проводить тестовые платежи можно только на тестовом окружении.

      ##### 3DS 1.0

      Если версия 3DS — 1.0, в запросе передаются параметры:

      |Название параметра| Описание                                                                                                                                                                       |
      |---|--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|
      |`MD`| Информация для идентификации платежной сессии на стороне торговой точки. Возвращается в ответе метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).   |
      |`PaReq`| Запрос на аутентификацию плательщика, который содержит разные детали транзакции. Возвращается в ответе метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize). |
      |`TermURL`| Адрес перенаправления после аутентификации 3DS. Должен содержать ссылку на обработчик на стороне мерчанта, принимающий результаты прохождения 3-D Secure.                      |

      ##### 3DS 2.0

      Если версия 3DS — 2.0, в запросе передаются параметры в зависимости от типа устройства клиента. Тип устройства передается
      в запросе [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize) в параметре `deviceChannel`. Возможны два 
      варианта — браузер (BRW, код `02`) и приложение (APP, код `01`).

      Параметры для браузера:

      |Название параметра|Тип данных| Описание                                                                                                                                   |
      |---|---|--------------------------------------------------------------------------------------------------------------------------------------------|
      |`creq`|string| JSON с параметрами `threeDSServerTransID`, `acsTransID`,`challengeWindowSize`, `messageType`, `messageVersion`, закодированный в `base64`. |
        
      Строка `creq` для браузера формируется из следующих параметров:

      |<div style="width:170px">Название параметра</div>|Тип данных| Описание                                                                                                                                                                                                                |
      |---|---|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|
      |`threeDSServerTransID`|string| Идентификатор транзакции из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).                                                                                                        |
      |`acsTransID`|string| Идентификатор транзакции, присвоенный ACS, полученный из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).                                                                           |
      |`challengeWindowSize`|string| Размер экрана, на котором открыта страница ACS. Допустимые значения:<li>**01** = 250 x 400;</li><li>**02** = 390 x 400;</li><li>**03** = 500 x 600;</li><li>**04** = 600 x 400;</li><li>**05** = Full screen.</li></ul> |
      |`messageType`|string| Передается фиксированное значение `CReq`.                                                                                                                                                                               |
      |`messageVersion`|string| Версия 3DS, полученная из ответа метода [Check3DSVersion](#tag/Standartnyj-platezh/operation/Check3dsVersion).                                                                                                          |

      Параметры для приложения:

      |Название параметра|Тип данных| Описание                                                                                                                                                  |
      |---|---|-----------------------------------------------------------------------------------------------------------------------------------------------------------|
      |`creq`|string| JWE object с параметрами `threeDSServerTransID`, `acsTransID`, `messageType`, `messageVersion`, закодированный в `PS256`. |

      Строка `creq` для приложения формируется из следующих параметров:

      |<div style="width:180px">Название параметра</div>|Тип данных| Описание                                                                                                                             |
      |---|---|--------------------------------------------------------------------------------------------------------------------------------------|
      |`threeDSServerTransID`|string| Идентификатор транзакции из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).                                                                         |
      |`acsTransID`|string| Идентификатор транзакции, присвоенный ACS, полученный из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize).                                                 |
      |`messageType`|string| Передается фиксированное значение `CReq`.                                                                                              |
      |`messageVersion`|string| Версия 3DS, полученная из ответа метода [Check3DSVersion](#tag/Standartnyj-platezh/operation/Check3dsVersion).                                                                           |
      <!--|`sdkTransID`|string| Уникальный идентификатор транзакции, назначенный 3DS SDK для идентификации одной транзакции, полученный из ответа метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize). |
      |`sdkCounterStoA`|string| Внутренний счетчик 3DS SDK внутри ACS. Поддерживаемые значения:<br>000–255.</br>                                                     |-->


      #### Подтверждение прохождения 3DS

      Когда сервис аутентификации банка, который выпустил карту, прислал результат прохождения 3D-Secure, мерчант должен
      передать эту информацию в MAPI. В зависимости от версии протокола 3DS нужно вызвать один из методов:
      - Для 3DS 1.0 — [Submit3DSAuthorization](#tag/Prohozhdenie-3DS/operation/Submit3DSAuthorization).
      - Для 3DS 2.0 — [Submit3DSAuthorizationV2](#tag/Prohozhdenie-3DS/operation/Submit3DSAuthorizationV2).

      ### Сценарий платежа с обработкой карточных данных на стороне Т-кассы с помощью платежной формы банка

      #### Инициировать платеж

      Чтобы создать платеж, мерчант должен инициировать его через метод [Init](#tag/Standartnyj-platezh/operation/Init) — передать сумму платежа и номер заказа.
      При успешном прохождении запроса в ответе метода [Init](#tag/Standartnyj-platezh/operation/Init) вернется параметр `PaymentURL`, на который нужно переадресовать клиента. 
      При переходе на `PaymentURL` клиенту откроется платежная форма Т‑Кассы, где нужно ввести реквизиты карты, а после этого — этап прохождения 3DS.

      > Методы Authorize и FinishAuthorize вызываются системами Т‑Кассы при переадресации клиента на PaymentURL — параметр возвращается в ответе метода [Init](#tag/Standartnyj-platezh/operation/Init). 
      Актуально для мерчантов, которые используют платежную форму Т-Банка.

      При вызове метода [Init](#tag/Standartnyj-platezh/operation/Init) в объекте `DATA` в атрибуте `OperationInitiatorType` нужно передавать [признак инициатора операции](https://www.tbank.ru/kassa/dev/payments/#section/Peredacha-priznaka-iniciatora-operacii).

      #### Метод Authorize

      Вызывается автоматически при переадресации клиента на страницу `PaymentURL`, которая возвращается в ответе метода [Init](#tag/Standartnyj-platezh/operation/Init). 
      Статус платежа выставляется в `FORM_SHOWED`.

      #### Метод FinishAuthorize

      Подтверждает инициированный платеж передачей карточных данных и списывает деньги с карты клиента.

      #### Исполнение платежа на платежной форме Т‑Кассы

      Вызывается формой оплаты по адресу `PaymentURL`, когда клиент вводит данные карты и нажимает кнопку **Оплатить**.

      Статус перевода:

      * `CONFIRMED` — при успешном сценарии;
      * `REJECTED` — при неуспешном.

      Клиент переадресовывается на:
      * `Success URL` — при успешном переводе;
      * `Fail URL` — при неуспешном переводе.

      #### Завершение платежа

      Если платёж завершился успешно, клиент будет перенаправлен на страницу `Success URL` из настроек терминала.

      ### Двухстадийный платеж

      Двухстадийный платеж включает два этапа: 

      1. Банк проверяет наличие средств у клиента и блокирует их — холдирует.
      2. Мерчант подтверждает списание средств или отменяет блокировку.

      Когда клиент оплачивает заказ, деньги за покупку замораживаются (холдируются) на его счете до семи дней.
      Если за это время клиент:

      - Отказался от заказа — он автоматически получает деньги обратно, а компания избегает комиссии за эквайринг.
      - Не стал отказываться от товара и вы подтвердили продажу в течение семи дней, деньги на его счете размораживаются 
      и поступают на счет компании. В этом случае Т‑Касса списывает комиссию.

      Если мерчант не подтвердит платеж вовремя, он может столкнуться с негативом от клиента — например, когда клиент может 
      не вспомнить, за что списались деньги, и обратиться в свой банк для возврата средств.

      <details><summary><b>Сроки холдирования</b></summary>
      <br>

      Холдирование денег на карте покупателя допускается на срок до 7 дней согласно правилам НСПК. Например, покупатель оплатил товар 1 марта и его банк заморозил средства на счете. Подтвердить платеж необходимо в течение 7 дней, включая день авторизации, т.е. до 7 марта включительно. По истечении этого времени деньги на счете покупателя могут быть расхолдированы и потрачены им, подтвердить списание не получится.

      </details>

      **Техническая реализация двухстадийных платежей**  

      Если терминал настроен на прием двухстадийных платежей, после вызова метода [FinishAuthorize](#tag/Standartnyj-platezh/operation/FinishAuthorize) деньги блокируются на карте 
      клиента, и платеж переходит в статус `AUTHORIZED`.

      Когда мерчант захочет списать деньги, он должен вызвать метод [Confirm](#tag/Dvuhstadijnyj-platezh/operation/Confirm) и передать `PaymentId` в
      запросе. После успешного списания платеж перейдет в статус `CONFIRMED`. Если мерчант хочет отменить заказ — например, если товар закончился —
      нужно вызвать метод [Cancel](https://www.tbank.ru/kassa/dev/payments/#tag/Otmena-platezha/operation/Cancel).

      ### Рекуррентные платежи

      Мерчант может сохранять платежные данные клиента и использовать их для повторных списаний. Такие платежи называются рекуррентными.
      В этом случае клиент должен совершить хотя бы один платеж, который был настроен как рекуррентный. Для этого мерчанту нужно передать
      параметр `Recurrent` в методе [Init](#tag/Standartnyj-platezh/operation/Init).

      После успешной оплаты MAPI отправит мерчанту уведомление об изменении статуса платежа на `AUTHORIZED` или `CONFIRMED` и 
      вернет параметр `RebillId`. Следующие платежи этого клиента будут рекуррентными, если мерчант вызовет метод [Init](#tag/Standartnyj-platezh/operation/Init), 
      а затем без переадресации на `PaymentURL` вызовет метод [Charge](#tag/Rekurrentnyj-platezh/operation/ChargePCI) и передаст параметр `RebillId`.
        
      >Метод [Charge](#tag/Rekurrentnyj-platezh/operation/ChargePCI) работает как по одностадийной, так и по двухстадийной схеме оплаты. 
      Чтобы перейти на двухстадийную схему, нужно переключить терминал в [личном кабинете](https://business.tbank.ru/oplata/main)
      и написать на <acq_help@tbank.ru> с просьбой переключить схему рекуррентов, либо в последующих платежах передавать в методе [Init](#tag/Standartnyj-platezh/operation/Init) параметр `Paytype` со значением `T`.<br>
      ВАЖНО: Параметры, которые передаются в методе [Init](#tag/Standartnyj-platezh/operation/Init) приоритетнее установленных настроек на терминале.

      ## Возврат и отмена платежа

      Мерчант может отменить успешный платеж. В этом случае деньги вернутся на карту, которую клиент указывал при совершении платежа.

      Успешный платеж — это платеж, который находится в статусе `AUTHORIZED` или `CONFIRMED`. Если мерчант отменяет платеж в статусе:
      - `AUTHORIZED` — заблокированная сумма размораживается на карте клиента.
      - `CONFIRMED` — деньги списываются со счета мерчанта и возвращаются на карту клиента.
        
      > Возврат может быть частичный или полный. Частичный возврат — отмена не на всю сумму платежа, полный — отмена на всю сумму платежа.

      Чтобы отменить платеж, мерчант должен вызвать метод [Cancel](https://www.tbank.ru/kassa/dev/payments/#tag/Otmena-platezha/operation/Cancel) и в запросе передать идентификатор платежа — `PaymentId`.
      По умолчанию MAPI сделает полный возврат. Если нужна частичная отмена, в запросе в параметре `Amount` мерчант передает сумму, 
      которая вернется клиенту.  

      <details><summary><b>Частичный возврат при подключенной онлайн-кассе</b></summary>

      1. Если при работе используется онлайн-касса, возврат можно делать только по позициям в чеке. Если нужно вернуть другую сумму,
      сначала отключите онлайн-кассу, а затем выполните возврат через метод [Cancel](https://www.tbank.ru/kassa/dev/payments/#tag/Otmena-platezha/operation/Cancel), передав в нем нужную сумму в параметре `Amount`

      2. Если у клиента подключена онлайн-касса, в методе [Cancel](https://www.tbank.ru/kassa/dev/payments/#tag/Otmena-platezha/operation/Cancel) передаются:

         * `Amount` — сумма к частичному возврату или анхолду. Формула расчета: `Price * Quantity` = `Amount`.
         * `Receipt` — параметры чека.

      Например, товар стоит 500.00 рублей, и нужно вернуть 50.00 рублей. В [Cancel](https://www.tbank.ru/kassa/dev/payments/#tag/Otmena-platezha/operation/Cancel) нужно передать `Amount` = `5000`:

      ```JSON
      {
          "Name": "Item12",
          "Price": 50000,
          "Quantity": 0.1,
          "Amount": 5000,
          "Tax": "none",
          "PaymentObject": "service"
      }
      ```

      Если в чеке несколько товаров, нужно сделать то же самое для каждого из них.

      Без активной онлайн-кассы достаточно передать нужную сумму в `Amount` через метод [Cancel](https://www.tbank.ru/kassa/dev/payments/#tag/Otmena-platezha/operation/Cancel). При частичном анхолде
      остаток также остается в резерве, и его нужно подтвердить.

      ## Получение данных о платеже

      Мерчант может получить информацию об основных параметрах платежа в любой момент.

      Если нужно получить данные по конкретному платежу, мерчанту нужно вызвать метод [GetState](#tag/Standartnyj-platyozh/paths/~1GetState/post) 
      и передать `PaymentId` в запросе.

      Если по одному заказу было несколько платежей, получить историю платежей и их текущий статус можно через метод [CheckOrder](#tag/Standartnyj-platyozh/paths/~1CheckOrder/post)
      — в запросе нужно передать `OrderId`.

      ## Статусная модель платежа

      В процессе обработки платеж меняет свое состояние. Основные статусы и условия перехода в них:

      | <div style="width:140px">Статус</div> | Правило перехода                                                                                                                                                                                                                                                                          | 
      |---|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|
      |`NEW`| MAPI получил запрос [Init](#tag/Standartnyj-platezh/operation/Init). После этого он создает новый платеж со статусом `NEW` и возвращает его идентификатор в параметре `PaymentId`, а также ссылку на платежную форму в параметре `PaymentURL`.                                            |
      |`FORM_SHOWED`| Мерчант перенаправил клиента на страницу платежной формы `PaymentURL` и страница загрузилась у клиента в браузере.                                                                                                                                                                        |
      |`AUTHORIZING`| Платеж обрабатывается MAPI и платежной системой.                                                                                                                                                                                                                                          |
      |`3DS_CHECKING`| Платеж проходит проверку 3D-Secure.                                                                                                                                                                                                                                                       |
      |`3DS_CHECKED`| Платеж успешно прошел проверку 3D-Secure.                                                                                                                                                                                                                                                 |
      |`AUTHORIZED`| Платеж авторизован, деньги заблокированы на карте клиента.                                                                                                                                                                                                                                |
      |`CONFIRMING`| Подтверждение платежа обрабатывается MAPI и платежной системой.                                                                                                                                                                                                                           |
      |`CONFIRMED`| Платеж подтвержден, деньги списаны с карты клиента.                                                                                                                                                                                                                                       |
      |`REVERSING`| Мерчант запросил отмену авторизованного, но еще неподтвержденного платежа. Возврат обрабатывается MAPI и платежной системой.                                                                                                                                                              |
      |`PARTIAL_REVERSED`| Частичный возврат по авторизованному платежу завершился успешно.                                                                                                                                                                                                                          |
      |`REVERSED`| Полный возврат по авторизованному платежу завершился успешно.                                                                                                                                                                                                                             |
      |`REFUNDING`| Мерчант запросил отмену подтвержденного платежа. Возврат обрабатывается MAPI и платежной системой.                                                                                                                                                                                        |
      |`PARTIAL_REFUNDED`| Частичный возврат по подтвержденному платежу завершился успешно.                                                                                                                                                                                                                          |
      |`REFUNDED`| Полный возврат по подтвержденному платежу завершился успешно.                                                                                                                                                                                                                             |
      |`CANCELED`| Мерчант отменил платеж.                                                                                                                                                                                                                                                                   |
      |`DEADLINE_EXPIRED`| 1. Клиент не завершил платеж в срок жизни ссылки на платежную форму `PaymentURL`. Этот срок мерчант передает в методе [Init](#tag/Standartnyj-platezh/operation/Init) в параметре `RedirectDueDate`. <br>2. Платеж не прошел проверку 3D-Secure в срок. |
      |`REJECTED`| Банк отклонил платеж.                                                                                                                                                                                                                                                                     |
      |`AUTH_FAIL`| Платеж завершился ошибкой или не прошел проверку 3D-Secure.                                                                                                                                                                                                                               |

      <details><summary><b>Полный жизненный цикл платежа — схема</b></summary>

      [![scheme](https://cdn.tbank.ru/static/documents/payment%20schema%20EACQ.jpg)](https://cdn.tbank.ru/static/documents/payment%20schema%20EACQ.jpg)
      </details>
