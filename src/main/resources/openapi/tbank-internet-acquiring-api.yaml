      | `Quantity` | Number | Да | Количество/вес:<br> • целая часть не больше 5 знаков;<br>• дробная часть не больше 3 знаков для Атол и 2 знаков для CloudPayments.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         | 1023 |
