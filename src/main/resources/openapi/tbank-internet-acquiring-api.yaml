            - AUTHORIZED
            - AUTH_FAIL
            - CANCELED
            - CHECKING
            - CHECKED
            - COMPLETING
            - COMPLETED
            - CONFIRMING
            - CONFIRMED
            - DEADLINE_EXPIRED
            - FORM_SHOWED
            - PARTIAL_REFUNDED
            - PREAUTHORIZING
            - PROCESSING
            - 3DS_CHECKING
            - 3DS_CHECKED
            - REVERSING
            - REVERSED
            - REFUNDING
            - REFUNDED
            - REJECTED
            - UNKNOWN
        PaymentId:
          type: string
          description: Уникальный идентификатор транзакции в системе Т‑Кассы.
          example: '2304882'
        ErrorCode:
