            - EINV
            - WM
          example: ACQ
    FinishAuthorize:
      type: object
      required:
        - TerminalKey
        - Amount
        - OrderId
        - Success
        - ErrorCode
        - Status
      properties:
        TerminalKey:
          description: |
            Идентификатор терминала. Выдается мерчанту Т‑Кассой
            при заведении терминала.
          type: string
          maxLength: 20
          example: TinkoffBankTest
        Amount:
          description: |
            Сумма в копейках.
          type: number
          maxLength: 20
          example: 100000
        OrderId:
          description: |
            Идентификатор заказа в системе мерчанта.
          type: string
          maxLength: 36
          example: '21050'
        Success:
          description: |
            Успешность прохождения запроса — `true`/`false`.
          type: boolean
          example: true
        Status:
          description: |
            Статус транзакции.
            Возвращается один из четырех статусов платежа:
              * `CONFIRMED` — при одностадийной оплате.
              * `AUTHORIZED` — при двухстадийной оплате.
              * `3DS_CHECKING` — когда нужно пройти проверку 3-D Secure. Если используется своя ПФ (протокол EACQ C PCI DSS) и платеж завис в этом статусе, нужно обратиться к эмитенту для устранения ошибок оплаты.
              * `REJECTED` — при неуспешном прохождении платежа.
          type: string
          maxLength: 20
          example: NEW
        PaymentId:
          description: |
            Идентификатор платежа в системе Т‑Кассы.
          type: string
          maxLength: 20
          example: '13660'
        ErrorCode:
          description: |
            Код ошибки. `0` в случае успеха.
          type: string
          maxLength: 20
          example: '0'
        Message:
          description: |
            Краткое описание ошибки.
          type: string
          maxLength: 255
          example: Неверные параметры
        Details:
          description: |
            Подробное описание ошибки.
          type: string
          example: '0'
        RebillId:
          type: string
          description: Идентификатор рекуррентного платежа.
          example: '21813157'
        CardId:
          description: Идентификатор карты в системе Т‑Кассы. Передается только для cохраненной карты.
          type: string
    Without3DS:
      allOf:
        - $ref: '#/components/schemas/FinishAuthorize'
        - type: object
          properties:
            CardId:
              type: string
              description: |
                Идентификатор карты в системе Т‑Кассы. 
                Передается только для сохраненной карты.
