      | `PaymentMethod` | Enum | Да | Возможные значения:<br> • `full_prepayment` — предоплата 100%;<br> • `prepayment` — предоплата;<br> • `advance` — аванс;<br> • `full_payment` — полный расчет;<br> • `partial_payment` — частичный расчет;<br> • `credit` — передача в кредит;<br> • `credit_payment` — оплата кредита.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 | 1214 |
      | `PaymentObject` | Enum | Да | Признак предмета расчёта.Если значение не передано, по умолчанию в онлайн-кассу отправляется `commodity`.<br><br>Возможные значения:<br> • `commodity` — товар;<br> • `excise` — подакцизный товар;<br> •`job` — работа;<br> • `service` — услуга;<br> • `gambling_bet` — ставка азартной игры;<br> • `gambling_prize` — выигрыш азартной игры;<br> • `lottery` — лотерейный билет<br> • `lottery_prize` — выигрыш лотереи;<br> • `intellectual_activity` — предоставление результатов интеллектуальной деятельности;<br> • `payment` — платеж;<br> • `agent_commission` — агентское вознаграждение;<br> • `composite` — составной предмет расчета;<br> • `another` — иной предмет расчета.                                                                                                                                                                                                                                                | 1212 |
      | `Tax` | Enum | Да | Ставка налога. Возможные значения:<br> • `none` — без НДС;<br> • `vat0` — НДС по ставке 0%;<br> •`vat5` — НДС по ставке 5%;<br> •`vat7` — НДС по ставке 7%;<br> • `vat10` — НДС чека по ставке 10%;<br> • `vat20` — НДС чека по ставке 20%;<br> • `vat105` — НДС чека по расчетной ставке 5/105;<br> • `vat107` — НДС чека по расчетной ставке 7/107;<br> • `vat110` — НДС чека по расчетной ставке 10/110;<br> • `vat120` — НДС чека по расчетной ставке 20/120.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 | 1199 |
      | `Ean13` | String | Нет | Штрихкод в требуемом формате. В зависимости от типа кассы, требования могут отличаться:<br><br>• **АТОЛ Онлайн** — шестнадцатеричное представление с пробелами. Максимальная длина — 32 байта (^[a-fA-F0-9]{2}$)(^([afA-F0-9]{2}\\s){1,31}[a-fA-F0-9]{2}$).<br> Пример:<br> `00 00 00 01 00 21 FA 41 00 23 05 41 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 12 00 AB 00`.<br><br>• **CloudKassir** — длина строки: четная, от 8 до 150 байт — то есть от 16 до 300 ASCII символов ['0' - '9' , 'A' - 'F' ] шестнадцатеричного представления кода маркировки товара.<br> Пример:<br> `303130323930303030630333435`.<br><br>• **OrangeData** — строка, содержащая base64 кодированный массив от 8 до 32 байт.<br> Пример:<br> `igQVAAADMTIzNDU2Nzg5MDEyMwAAAAAAAQ==`.<br>Если в запросе передать не прошедший валидацию параметр `Ean13`, возвращается неуспешный ответ с текстом ошибки в параметре `message` — «Неверный параметр Ean13». | 1162 |
      | `ShopCode` | String | Нет | Код магазина. Для параметра `ShopСode` нужно использовать значение параметра `Submerchant_ID`, полученного в ответ при регистрации магазинов через XML. Если XML не используется, передавать поле не нужно.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                |
      | `AgentData` | Object | Да, если используется агентская схема | Данные агента. Параметры объекта описаны в таблице **Структура объекта AgentData**.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        |
      | `SupplierInfo` | Object | Да, если передается значение `AgentSign` в объекте AgentData | Данные поставщика платежного агента. Параметры объекта описаны в таблице **Структура объекта AgentData**.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  |


      **Как передать скидку в платеже**

      На всех кассах, кроме Cloud Kassir, скидка уже должна быть заложена на стороне клиента — к нам в запросе должны приходить итоговые значения `Price`, `Quantity`, `Amount`.
      Произведение цены и количества/веса (`Price * Quantity`) должно быть равно общей сумме (`Amount`).

      Для Cloud Kassir скидка может быть учтена только в `Amount` — `Price` можно прописывать без скидки.

      **Промокоды и бонусы**

      При оплате бонусами для каждой позиции прописывается реальная полная стоимость в цене — `Price`. В объекте `Payments`
      нужно указать `AdvancePayment` (сумма оплаты бонусами) и `Electronic` (сумма, которую заплатил клиент).

        
      ### Структура объекта `Payments`

      | <div style="width:130px">**Параметр**</div> | **Тип** | **Обязательность** | **Описание**                                                           | **Тег ФФД** |
      | ------ | -------- | ------ |------------------------------------------------------------------------| -------- |
      | `Cash` | Number(14) | Нет | Вид оплаты «Наличные». Сумма к оплате в копейках, не больше 14 знаков. | 1031 |
      | `Electronic` | Number(14) | Да | Вид оплаты «Безналичный».                                              | 1081 |
      | `AdvancePayment` | Number(14) | Нет | Вид оплаты «Предварительная оплата (Аванс)».                           | 1215 |
      | `Credit` | Number(14) | Нет | Вид оплаты «Постоплата (Кредит)».                                      | 1216 |
      | `Provision` | Number(14) | Нет | Вид оплаты «Иная форма оплаты».                                        | 1217 |

      ### Структура объекта `AgentData`

      Данные агента. Обязателен, если используется агентская схема.

