      \* Включается в чек, если предметом расчета является товар, который подлежит обязательной
      маркировке средством идентификации — соответствующий код в поле `paymentObject`.

      \** Передается только в случае, если:
      - расчет осуществляется за маркированный товар — соответствующий код в поле `paymentObject`, 
      - значение в поле `measurementUnit` равно `0`. 

        Состоит из двух параметров:
         - `Numerator` — числитель дробной части предмета расчета. Значение должно быть строго меньше значения реквизита `Denominator`.
         - `Denominator` — знаменатель дробной части предмета расчета. Значение равно количеству товара в партии (упаковке), имеющей общий код маркировки товара. 

      Пример:

      ```json
      {
      "numerator": "1",
      "denominator": "2"
      }
      ```

      \*** Указывается только для товаров, подлежащих обязательной маркировке средством идентификации. Включение этого 
      реквизита предусмотрено НПА отраслевого регулирования для соответствующей товарной группы.

      **<a name="measurementUnit" style="text-decoration: none; color:#333333">Возможные значения объекта `measurementUnit`</a>**

      | **ПФ** | **Описание** |
      | ------- | ------ |
      | `шт` | Применяется для предметов расчета,<br>которые могут быть реализованы поштучно или единицами |
      | `г` | Грамм |
      | `кг` | Килограмм |
      | `т` | Тонна |
      | `см` | Сантиметр |
      | `дм` | Дециметр |
      | `м` | Метр |
      | `см2` | Квадратный сантиметр |
      | `дм2` | Квадратный дециметр |
      | `м2` | Квадратный метр |
      | `мл` | Миллилитр |
      | `л` | Литр |
      | `м3` | Кубический метр |
      | `кВт*ч` | Киловатт час |
      | `Гкал` | Гигакалория |
      | `сут` или `дн` | Сутки (день) |
      | `ч` | Час |
      | `мин` | Минута |
      | `c` | Секунда |
      | `Кбайт` | Килобайт |
      | `Мбайт` | Мегабайт |
      | `Гбайт` | Гигабайт |
      | `Тбайт` | Терабайт |
      | `-` | Применяется при использовании иных единиц измерения |

      **Как передать скидку в платеже**

      На всех кассах, кроме Cloud Kassir, скидка уже должна быть заложена на стороне клиента — к нам в запросе должны приходить итоговые значения `Price`, `Quantity`, `Amount`.
      Произведение цены и количества/веса (`Price * Quantity`) должно быть равно общей сумме (`Amount`).

      Для Cloud Kassir скидка может быть учтена только в `Amount` — `Price` можно прописывать без скидки.

      **Промокоды и бонусы**

      При оплате бонусами для каждой позиции прописывается реальная полная стоимость в цене — `Price`. В объекте `Payments`
      нужно указать `AdvancePayment` (сумма оплаты бонусами) и `Electronic` (сумма, которую заплатил клиент).

      ### Структура объекта `MarkCode`

      | <div style="width:120px">**Параметр**</div> | **Тип** | **Обязательность** | **Описание**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        |
      | ------ | -------- | ------ |-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|
      | `MarkCodeType` | String | Да | Тип штрихкода. Возможные значения: <br> • `UNKNOWN` — код товара, формат которого не идентифицирован, как один из реквизитов; <br> • `EAN8` — код товара в формате EAN-8; <br> • `EAN13` — код товара в формате EAN-13; <br> • `ITF14` — код товара в формате ITF-14; <br> • `GS10` — код товара в формате GS1, нанесенный на товар, не подлежащий маркировке <br> • `GS1M` — код товара в формате GS1, нанесенный на товар, подлежащий маркировке; <br> • `SHORT` — код товара в формате короткого кода маркировки, нанесенный на товар; <br> • `FUR` — контрольно-идентификационный знак мехового изделия; <br> • `EGAIS20` — код товара в формате ЕГАИС-2.0; <br> • `EGAIS30` — код товара в формате ЕГАИС-3.0; <br> • `RAWCODE` — код маркировки, как он был прочитан сканером. |
      | `value` | String | Да | Код маркировки.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     |

