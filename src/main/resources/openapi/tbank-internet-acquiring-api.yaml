      | Чек зависает в очереди на фискализацию с интеграцией через aQsi                                               | Нужно исправить ошибку самостоятельно или через поддержку aQsi.<br>Инструкция:<br>• В личном кабинете aQsi перейдите в **Настройки** → **Интеграции** → **Фискализация чеков на aQsi 5 из Orange Data**. Сгенерируйте токен (ключ) и скопируйте его.<br>• Перейдите в личный кабинет Orange Data в раздел **Услуги**. Вставьте токен (ключ) и сформируйте счет без ошибки.<br><br>[Инструкция aQsi](https://aqsi.ru/partner-support/vozmozhnyie-oshibki-i-sposobyi-ih-resheniya). |Orange Data|
      | `REGISTRATION_REQUEST_FAILED` — ошибка в запросе                                                              | Причины ошибки могут быть разные. Основная причина — вы не передали версию ФФД 1.2 в своем запросе, при том, что терминал и касса настроены на ФФД 1.2.                                                                                                                                                                                                                                                                                                                           |На всех кассах|
