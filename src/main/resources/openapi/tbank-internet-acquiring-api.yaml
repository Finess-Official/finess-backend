    description: |-
      | Ошибка                                                                                                        | Решение                                                                                                                                                                                                                                                                                                                                                                                                                                                                           | Онлайн-касса |
      |---------------------------------------------------------------------------------------------------------------|-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|---|
      | Состояние чека не найдено. Попробуйте позднее                                                                 | Ошибка на стороне кассы. Обратитесь в поддержку вашей онлайн-кассы и уточните причины ошибки в чеке.                                                                                                                                                                                                                                                                                                                                                                              |На всех кассах|
