  - name: Квитанции
    description: |-
      Чтобы квитанция отправилась, на платежной форме нужно отображать электронную почту с выбором чек-бокса `Нужна квитанция`.

      ### Настройка обязательности заполнения электронной почты

      Вы можете настроить обязательный ввод электронной почты на платежной форме. В таком случае электронная почта для отправки квитанции
      будет обязательной для заполнения.

      При включении этой настройки покупателям будет доступна только оплата картой — T-Pay, Sber Pay и другие способы будут недоступны.
      Для включения настройки обратитесь в чат поддержки.
  - name: Описание дополнительных объектов
    description: |-
      ### Структура объекта `Receipt` для ФФД 1.05

      JSON-объект с данными чека. Обязателен, если подключена онлайн-касса.

      | <div style="width:100px">**Параметр**</div> | **Тип** | **Обязательность** | **Описание**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      | **Тег ФФД** |
      | ------ | -------- | ------ |---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------| -------- |
