      | ------ | -------- | ------ |---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------| -------- |
      | `AgentSign` | String | Нет | Признак агента.<br> Возможные значения:<br> • `bank_paying_agent` — банковский платежный агент;<br> • `bank_paying_subagent` — банковский платежный субагент;<br> • `paying_agent` — платежный агент;<br> • `paying_subagent` — платежный субагент;<br> • `attorney` — поверенный;<br> • `commission_agent` — комиссионер;<br> • `another` — другой тип агента.<br> | 1222 |
      | `OperationName` | String | Нет | Наименование операции.<br> Атрибут обязателен, если `AgentSign` передан в значениях:<br> • bank_paying_agent <br> • bank_paying_subagent                                                                                                                                                                                                                            | 1044 |
      | `Phones` | Array of Strings | Нет | Телефоны платежного агента в формате `+{Ц}`. <br> Атрибут обязателен, если в `AgentSign` передан в значениях:<br> • `bank_paying_agent`;<br> • `bank_paying_subagent`;<br> • `paying_agent`;<br> • `paying_subagent`.                                                                                                                                               | 1073 |
