            платежа по QR-коду становятся недоступными и платёж выполнить нельзя.
            - Максимальное значение — 90 дней от текущей даты.
            - Минимальное значение — 1 минута от текущей даты.
            - Формат даты — `YYYY-MM-DDTHH24:MI:SS+GMT`.
