            - false
          example: 'false'
        TerminalInfo.TokenRequired:
          type: boolean
          description: Признак необходимости подписания токеном.
          enum:
            - true
            - false
          example: 'true'
        TerminalInfo.InitTokenRequired:
          type: boolean
          description: Признак необходимости подписания токеном запроса **Init**.
          enum:
            - true
            - false
          example: 'true'
    by_url:
      title: URL
      required:
        - TerminalKey
        - CallbackUrl
        - PaymentIdList
        - Token
      properties:
        TerminalKey:
          type: string
          description: Идентификатор терминала, выдается мерчанту Т‑Кассой.
          example: TinkoffBankTest
        CallbackUrl:
          type: string
          description: URL сервиса получения справок.
          example: https://www.tinkoff.ru
        PaymentIdList:
          type: array
          description: JSON-массив, содержащий в себе перечень `paymentID` (уникальных идентификаторов в системе Т‑Кассы) c типом `Number`.
          example:
            - 1201206437
            - 1201206442
          items:
            type: number
        Token:
          type: string
          description: Подпись запроса.
          example: f2fdd7fec8225872590e1558b7ea258c75df8f300d808006c41ab540dd7514d9
    by_email:
      title: Email
      required:
        - TerminalKey
        - PaymentIdList
        - EmailList
        - Token
      properties:
        TerminalKey:
          type: string
          description: Идентификатор терминала, выдается мерчанту Т‑Кассой.
          example: TinkoffBankTest
        PaymentIdList:
          type: array
          description: JSON-массив, содержащий в себе перечень `paymentID` (уникальных идентификаторов в системе Т‑Кассы) c типом `Number`.
          example:
            - 1201206437
            - 1201206442
          items:
            type: number
        EmailList:
          type: array
          description: JSON-массив, содержащий перечень `Email` с типом `String`.
          example:
            - test1@tinkoff.ru
            - test2@tinkoff.ru
          items:
            type: string
            properties:
              Email:
                type: string
        Token:
          type: string
          description: Подпись запроса.
          example: f2fdd7fec8225872590e1558b7ea258c75df8f300d808006c41ab540dd7514d9
    PaymentIdListForGCO:
      type: object
      description: JSON-массив с объектами, содержащими информацию по запросу.
      required:
        - Success
        - ErrorCode
        - Message
        - PaymentId
      properties:
        Success:
          type: boolean
          description: Успешность прохождения запроса — `true`/`false`.
          example: true
        ErrorCode:
          type: string
          description: Код ошибки. `0` в случае успеха.
          example: 0
        Message:
          type: string
