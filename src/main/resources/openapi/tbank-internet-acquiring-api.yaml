                  - TerminalKey
                  - CustomerKey
                  - RequestKey
                  - CardId
                  - ErrorCode
                  - Success
                properties:
                  TerminalKey:
                    description: |
                      Идентификатор терминала. Выдается мерчанту Т‑Кассой 
                      при заведении терминала.
                    type: string
                    maxLength: 20
                    example: TinkoffBankTest
                  CustomerKey:
                    description: |
                      Идентификатор клиента в системе мерчанта.
                    type: string
                    maxLength: 36
                    example: testCustomer1234
                  RequestKey:
                    description: |
                      Идентификатор запроса на привязку карты.
                    type: string
                    example: 13021e10-a3ed-4f14-bcd1-823b5ac37390
                  RebillId:
                    description: |
                      Идентификатор рекуррентного платежа.
                    type: string
                  CardId:
                    description: |
                      Идентификатор карты в системе Т‑Кассы.
                    type: string
                    maxLength: 40
                    example: '156516516'
                  Success:
                    description: |
                      Успешность прохождения запроса — `true`/`false`.
                    type: boolean
                    example: true
                  ErrorCode:
                    description: |
                      Код ошибки. `0` в случае успеха.
                    type: string
                    maxLength: 20
                    example: '0'
                  Message:
                    description: |
                      Краткое описание ошибки.
                    type: string
                  Details:
                    description: |
                      Подробное описание ошибки.
                    type: string
                  Status:
                    description: |
                      Статус платежа.
                    type: string
                    maxLength: 20
                    example: NEW
  /v2/Submit3DSAuthorization:
    post:
      operationId: Submit3DSAuthorization
      tags:
        - Прохождение 3DS
      summary: Подтвердить прохождение 3DS v1.0
      description: |
        `Для мерчантов, использующих собственную платежную форму`


         Проверяет результаты прохождения 3-D Secure и при успешном прохождении
         подтверждает инициированный платеж.
         При использовании:
         - одностадийной оплаты — списывает денежные средства с карты
         клиента;
         - двухстадийной оплаты — блокирует указанную сумму на карте клиента.

         Формат запроса — `x-www-form-urlencoded`.


         После того, как мерчант получит ответ ACS с результатами прохождения 3-D Secure на `TermUrl`, нужно
         отправить запрос через метод **Submit3DSAuthorization**.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - MD
                - PaRes
              properties:
                MD:
                  description: |
                    Уникальный идентификатор транзакции в системе. Возвращается в ответе от ACS.
                  type: string
                  example: '2561504'
                PaRes:
                  description: |
                    Шифрованная строка, содержащая результаты 3-D Secure аутентификации. Возвращается в ответе от ACS.
                  type: string
                  example: 
                PaymentId:
                  description: |
                    Уникальный идентификатор транзакции в системе Т‑Кассы.
                  type: string
                  example: '10063'
                TerminalKey:
                  description: |
                    Идентификатор терминала, выдается мерчанту Т‑Кассой.
                  type: string
                  maxLength: 20
                  example: testRegressBank
                Token:
                  description: |
                    Подпись запроса.
                  type: string
                  example: 30797e66108934dfa3d841b856fdad227c6b9c46d6a39296e02dc800d86d181e
      x-codeSamples:
        - lang: Payload
          source: |
            <body onload="document.form.submit()">
            <form name="form" action="https://rest-api-test.tinkoff.ru/v2/Submit3DSAuthorization" method="post">
              <input type="hidden" name="MD" value="2561504">
              <input type="hidden" name="PaRes" value="">
              <input type="hidden" name="PaymentId" value="10063">
              <input type="hidden" name="TerminalKey" value="TinkoffBankTest">
              <input type="hidden" name="Token" value="871199b37f207f0c4f721a37cdcc71dfcea880b4a4b85e3cf852c5dc1e99a8d6" >
            </form>
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - TerminalKey
                  - OrderId
                  - Success
                  - Status
                  - PaymentId
                  - ErrorCode
                properties:
                  TerminalKey:
                    description: |
                      Идентификатор терминала, выдается мерчанту Т‑Кассой.
                    type: string
                  OrderId:
                    description: |
                      Номер заказа в системе мерчанта.
                    type: string
                  Success:
                    description: |
                      Успешность прохождения запроса — `true`/`false`.
                    type: boolean
                  Status:
                    description: |
                      Статус транзакции:
                      - `CONFIRMED` — при успешном сценарии и одностадийном проведении платежа;
                      - `AUTHORIZED` — при успешном сценарии и двухстадийном проведении платежа; 
                      - `REJECTED` — при неуспешном сценарии.
                    type: string
                  PaymentId:
                    description: |
                      Уникальный идентификатор транзакции в системе Т‑Кассы.
                    type: string
                  ErrorCode:
                    description: |
                      Код ошибки. `0` в случае успеха.
                    type: string
                    maxLength: 20
                  Message:
                    description: |
                      Краткое описание ошибки.
                    type: string
                  Details:
                    description: |
                      Подробное описание ошибки.
                    type: string
              examples:
                Submit3DSAuthorizationResponse:
                  summary: Пример ответа
                  value:
                    TerminalKey: TinkoffBankTest
                    OrderId: '21050'
                    Success: true
                    Status: CONFIRMED
                    PaymentId: '10063'
                    ErrorCode: '0'
                    Message: string
                    Details: string
