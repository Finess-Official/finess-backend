  - name: Тестирование и тестовые карты
    description: |-
      Тестовые карты нужны как для прохождения тест-кейсов, так и совершения тестовых платежей. Это два разных процесса, в
      каждом из которых используются разные данные тестовых карт:

      * Для прохождения тест-кейсов — тестовый терминал с приставкой `DEMO`. Запросы с него нужно отправлять на [боевую среду](https://securepay.tinkoff.ru/v2)
      и использовать тестовые карты из тест-кейса. 

         Данные карт для тест-кейсов можно найти в личном кабинете: раздел **Магазины** → **Терминалы** → **Тестовый** →
        **Тестировать**. При выборе определенного тест-кейса появится информация с данными карты.

      * Для совершения тестовых платежей — боевой терминал без приставки `DEMO`. 
      Запросы с него нужно отправлять на [тестовую среду](https://rest-api-test.tinkoff.ru/v2) и использовать тестовые карты, указаные ниже.

      <details><summary><b>Добавление IP в White List</b></summary>

      Чтобы пользоваться тестовой средой, нужно добавить ваш IP-адрес в White List тестовой среды. Для этого пришлите нам:
      1. ИНН.
      2. Наименование организации.
      3. IP-адрес (или пул адресов), с которого планируется обращение.
      4. Тестовый URL, по которому будете обращаться:

         * `rest-api-test.tinkoff.ru` — для запросов по API в рамках обычных WEB оплат/выплат;
         * `sm-register-test.tcsbank.ru` — для регистрации точек агрегатором/маркетплейсом.

      >**Важно**<br> 
      Отправлять запросы для открытия платежной формы для оплаты нужно с IP-адреса, который был добавлен в White List.
      </details>

      <details><summary><b>Информация по прохождению тест-кейсов</b></summary>
      <br>

      1. Для прохождения тест-кейса №1 в запросе **Init** не нужно передавать `Reсurrent = Y` (`recurrent:true`), так как флаг рекуррентов 
      не даст системе засчитать платеж как тест-кейс.

      2. При получении ошибки «Ошибка нотификации: не получаем ответ ОК» при прохождении тест-кейса №2 нужно проверить правильность
      передачи ответа на нотификацию. Верный ответ — 200:ОК.

      3. Для прохождения тест-кейсов в запросе **Init** нельзя передавать параметры, которые противоречат настройкам терминала.

      Например, на терминале установлена двухстадийная оплата, а в **Init** был передан `pay_type = О` — признак одностадийности.
      Если вам нужно поменять тип проведения платежа:

      1. Перейдите в личный кабинет интернет-эквайринга на вкладку **Магазины**. 
      2. Выберите нужный платеж и на вкладке **Способы оплаты** выберите **Списание средств**. 
      3. Напротив нужного пункта отметьте **Списывать сразу (одностадийная)** или **Блокировать на счету покупателя (двустадийная)**.
      </details>

      Вы можете использовать любой срок действия для тестовой карты. Можно произвести несколько тестовых привязок с разными сроками 
      действия и потом через метод **GetCardList** посмотреть, какие карты привязаны. Тестовые карты используются при проведении операций на тестовой среде.
       
      Описание параметра `TransStatus` находится в описании параметров ответа `cres` (JSON/JWE cres объект).

